name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (Node 22.x)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 22.x

      # The repo has no committed lockfile, so fall back to `npm install`
      # when `npm ci` cannot run. Either way this is the only network step.
      - name: Install dependencies
        run: npm ci || npm install

      # ---- Test gates (offline, install-free, must pass) ----------------
      # These run on Node's built-in test runner with
      # --experimental-strip-types and require no network or secrets.
      - name: Unit tests (packages)
        run: npm test

      - name: Functional tests (api + worker)
        run: npm run test:functional

      - name: End-to-end tests (cross-component)
        run: npm run test:e2e

      - name: Plugin tests
        run: npm run test:plugins

      - name: CLI tests
        run: npm run test:cli

      - name: Web tests
        run: npm run test:web

      - name: Security tests
        run: npm run test:security

      # ---- Typecheck -----------------------------------------------------
      # Hard gate. `tsc --noEmit` runs against the root tsconfig which
      # excludes the web app (it has its own tsconfig + Vite build).
      - name: Typecheck
        run: npm run typecheck

      # ---- Web build -----------------------------------------------------
      # Fatal: with dependencies installed by the step above, `vite build`
      # for the @ragdoll/web workspace must succeed in CI.
      - name: Build web
        run: npm run build:web
