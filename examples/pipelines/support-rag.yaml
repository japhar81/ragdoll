apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: support-rag
  description: "Canonical synchronous retrieval pipeline using dataset_search + executionKind: synchronous; auto-exposed as an MCP tool."
  labels:
    domain: support
  executionKind: synchronous
  mcpExpose: true
  stages:
  - id: s_auto_1
    label: Stage 1
  - id: s_auto_2
    label: Stage 2
  - id: s_auto_3
    label: Stage 3
  - id: s_auto_4
    label: Stage 4
  - id: s_auto_5
    label: Stage 5
  - id: s_auto_6
    label: Stage 6
spec:
  parameters:
  - key: retrieval.top_k
    type: integer
    defaultValue: 5
    allowedScopes:
    - global
    - pipeline
    - tenant_pipeline
    - runtime
    tenantOverridable: true
    runtimeOverridable: true
    description: Number of retrieved chunks.
  - key: chunking.chunk_size
    type: integer
    defaultValue: 1000
    allowedScopes:
    - pipeline
    tenantOverridable: false
    runtimeOverridable: false
    description: Locked chunk size for index compatibility.
  nodes:
  - id: input
    type: input
    ui:
      position:
        x: -1.8408203125
        y: 40
      stageId: s_auto_1
  - id: retrieve
    plugin:
      category: retriever
      id: dataset_search
      version: 1.0.0
    # Phase 5: the runtime resolves this slug at execute time and
    # passes the resolved ResolvedDataset on input.dataset. The
    # plugin reads `dataset.backendCollections.vector` for the
    # physical collection name — no hard-coded collection here.
    dataset:
      slug: support-rag
      alias: stable
    config:
      modality: vector
      topK: "${config.retrieval.top_k}"
    ui:
      position:
        x: 453.6171875
        y: 40
      stageId: s_auto_2
  - id: prompt
    plugin:
      category: prompt_template
      id: basic_rag_prompt
      version: 1.0.0
    ui:
      position:
        x: 909.018798828125
        y: 40
      stageId: s_auto_3
  - id: guardrail
    plugin:
      category: guardrail
      id: simple_keyword_guardrail
      version: 1.0.0
    config:
      blockedKeywords:
      - ignore previous instructions
    ui:
      position:
        x: 1366.055908203125
        y: 40
      stageId: s_auto_4
  - id: llm
    plugin:
      category: llm
      id: provider_chat
      version: 1.0.0
    config:
      provider: "${config.llm.provider}"
      model: "${config.llm.model}"
      temperature: "${config.llm.temperature}"
      baseUrl: "${config.llm.base_url}"
    secrets:
      apiKey:
        scope: tenant
        key: llm.api_key
    ui:
      position:
        x: 1825.574462890625
        y: 40
      stageId: s_auto_5
  - id: output
    type: output
    ui:
      position:
        x: 2287.574462890625
        y: 40
      stageId: s_auto_6
  edges:
  - from: input
    to: retrieve
    fromPort: question
    toPort: question
  - from: input
    to: prompt
    fromPort: question
    toPort: question
  - from: retrieve
    to: prompt
    fromPort: documents
    toPort: documents
  - from: prompt
    to: guardrail
    fromPort: messages
    toPort: messages
  - from: guardrail
    to: llm
    fromPort: messages
    toPort: messages
  - from: llm
    to: output
