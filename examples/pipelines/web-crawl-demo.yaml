apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: web-crawl-demo
  stages:
  - id: s_auto_1
    label: Stage 1
  - id: s_auto_2
    label: Stage 2
  - id: s_auto_3
    label: Stage 3
spec:
  nodes:
  - id: input
    type: input
    ui:
      position:
        x: 18.6875
        y: 40
      stageId: s_auto_1
  - id: crawl
    plugin:
      category: datasource
      id: crawl4ai_crawler
      version: 1.0.0
    config:
      url: "https://www.cnn.com"
      maxPages: 5
      maxDepth: 1
      sameDomainOnly: true
      extract: markdown
      timeoutMs: 60000
    ui:
      position:
        x: 479.65625
        y: 40
      stageId: s_auto_2
  - id: output
    type: output
    ui:
      position:
        x: 941.65625
        y: 40
      stageId: s_auto_3
  edges:
  - from: input
    to: crawl
  - from: crawl
    to: output
    fromPort: documents
    toPort: documents
