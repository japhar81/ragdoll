apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: support-ingestion
  labels:
    domain: support
    mode: ingestion
spec:
  nodes:
    - id: input
      type: input
    - id: load
      plugin:
        category: loader
        id: file_document_loader
        version: "1.0.0"
    - id: chunk
      plugin:
        category: chunker
        id: basic_text_chunker
        version: "1.0.0"
      config:
        chunkSize: "${config.chunking.chunk_size}"
        overlap: 100
    - id: embed
      plugin:
        category: embedder
        id: provider_embeddings
        version: "1.0.0"
      config:
        provider: "${config.embedding.provider}"
        model: "${config.embedding.model}"
    - id: write
      plugin:
        category: vector_store
        id: qdrant_vector_store
        version: "1.0.0"
      config:
        isolationMode: "${config.vector.isolation.mode}"
    - id: output
      type: output
  edges:
    - from: input
      to: load
    - from: load
      to: chunk
    - from: chunk
      to: embed
    - from: embed
      to: write
    - from: write
      to: output
