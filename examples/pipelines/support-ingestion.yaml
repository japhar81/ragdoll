apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: support-ingestion
  labels:
    domain: support
    mode: ingestion
spec:
  nodes:
    - id: input
      type: input
    - id: load
      plugin:
        category: loader
        id: file_document_loader
        version: "1.0.0"
    - id: chunk
      plugin:
        category: chunker
        id: basic_text_chunker
        version: "1.0.0"
      config:
        chunkSize: "${config.chunking.chunk_size}"
        overlap: 100
    - id: embed
      plugin:
        category: embedder
        id: provider_embeddings
        version: "1.0.0"
      config:
        provider: "${config.embedding.provider}"
        model: "${config.embedding.model}"
    - id: write
      plugin:
        category: vector_store
        id: qdrant_vector_store
        version: "1.0.0"
      config:
        isolationMode: "${config.vector.isolation.mode}"
    - id: output
      type: output
  edges:
    # Loader receives the input payload (e.g. text/uri) unported so any
    # legacy field shape still reaches it via the flatten fallback.
    - from: input
      to: load
    # Loader emits documents/text; chunker reads text. Leave unported so the
    # flatten fallback delivers whichever shape the loader produced.
    - from: load
      to: chunk
    # Explicit chunk → embed (texts derived from chunks).
    - from: chunk
      to: embed
      fromPort: chunks
      toPort: chunks
    # The write node needs BOTH chunks (for payload text) and vectors
    # (for the embedding). Fan in from both upstreams.
    - from: chunk
      to: write
      fromPort: chunks
      toPort: chunks
    - from: embed
      to: write
      fromPort: vectors
      toPort: vectors
    - from: write
      to: output
