apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: query-only
spec:
  nodes:
    - id: input
      type: input
    - id: prompt
      plugin:
        category: prompt_template
        id: basic_rag_prompt
        version: "1.0.0"
    - id: llm
      plugin:
        category: llm
        id: provider_chat
        version: "1.0.0"
      config:
        provider: "${config.llm.provider}"
        model: "${config.llm.model}"
      secrets:
        apiKey:
          scope: tenant
          key: llm.api_key
    - id: parse
      plugin:
        category: output_parser
        id: json_output_parser
        version: "1.0.0"
    - id: output
      type: output
  edges:
    - from: input
      to: prompt
    - from: prompt
      to: llm
    - from: llm
      to: parse
    - from: parse
      to: output
