apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: query-only
  stages:
  - id: s_auto_1
    label: Stage 1
  - id: s_auto_2
    label: Stage 2
  - id: s_auto_3
    label: Stage 3
  - id: s_auto_4
    label: Stage 4
  - id: s_auto_5
    label: Stage 5
spec:
  nodes:
  - id: input
    type: input
    ui:
      position:
        x: 1.091796875
        y: 40
      stageId: s_auto_1
  - id: prompt
    plugin:
      category: prompt_template
      id: basic_rag_prompt
      version: 1.0.0
    ui:
      position:
        x: 459.57373046875
        y: 40
      stageId: s_auto_2
  - id: llm
    plugin:
      category: llm
      id: provider_chat
      version: 1.0.0
    config:
      provider: "${config.llm.provider}"
      model: "${config.llm.model}"
    secrets:
      apiKey:
        scope: tenant
        key: llm.api_key
    ui:
      position:
        x: 918.72705078125
        y: 40
      stageId: s_auto_3
  - id: parse
    plugin:
      category: output_parser
      id: json_output_parser
      version: 1.0.0
    ui:
      position:
        x: 1379.3037109375
        y: 40
      stageId: s_auto_4
  - id: output
    type: output
    ui:
      position:
        x: 1841.3037109375
        y: 40
      stageId: s_auto_5
  edges:
  - from: input
    to: prompt
    fromPort: question
    toPort: question
  - from: prompt
    to: llm
    fromPort: messages
    toPort: messages
  - from: llm
    to: parse
    fromPort: text
    toPort: text
  - from: parse
    to: output
