apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: crawl-summarize-demo
spec:
  nodes:
  - id: input
    type: input
    ui:
      position:
        x: 1.091796875
        y: 40
  - id: retrieve
    plugin:
      category: datasource
      id: crawl4ai_crawler
      version: 1.0.0
    config:
      url: "https://www.cnn.com"
      maxPages: 5
      maxDepth: 1
      sameDomainOnly: true
      extract: markdown
      timeoutMs: 60000
    ui:
      position:
        x: 459.57373046875
        y: 40
  - id: prompt
    plugin:
      category: prompt_template
      id: basic_rag_prompt
      version: 1.0.0
    ui:
      position:
        x: 918.72705078125
        y: 40
  - id: llm
    plugin:
      category: llm
      id: provider_chat
      version: 1.0.0
    config:
      provider: "${config.llm.provider}"
      model: "${config.llm.model}"
      baseUrl: "${config.llm.base_url}"
    ui:
      position:
        x: 1379.3037109375
        y: 40
  - id: output
    type: output
    ui:
      position:
        x: 1841.3037109375
        y: 40
  edges:
  - from: input
    to: prompt
    fromPort: question
    toPort: question
  - from: input
    to: retrieve
  - from: retrieve
    to: prompt
    fromPort: documents
    toPort: documents
  - from: prompt
    to: llm
    fromPort: messages
    toPort: messages
  - from: llm
    to: output
