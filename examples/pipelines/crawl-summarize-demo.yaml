apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: crawl-summarize-demo
spec:
  nodes:
    - id: input
      type: input
    - id: retrieve
      plugin:
        category: datasource
        id: crawl4ai_crawler
        version: "1.0.0"
      config:
        url: "https://www.cnn.com"
        maxPages: 5
        maxDepth: 1
        sameDomainOnly: true
        extract: "markdown"
        timeoutMs: 60000
    - id: prompt
      plugin:
        category: prompt_template
        id: basic_rag_prompt
        version: "1.0.0"
    - id: llm
      plugin:
        category: llm
        id: provider_chat
        version: "1.0.0"
      config:
        provider: "${config.llm.provider}"
        model: "${config.llm.model}"
        baseUrl: "${config.llm.base_url}"
    - id: output
      type: output
  edges:
    # The question lives on the pipeline's runtime input; forward it from the
    # `input` framework node to the prompt's `question` port. The crawler
    # ignores `inputs.question` and emits `documents` independently.
    - from: input
      to: prompt
      fromPort: question
      toPort: question
    - from: input
      to: retrieve
    - from: retrieve
      to: prompt
      fromPort: documents
      toPort: documents
    - from: prompt
      to: llm
      fromPort: messages
      toPort: messages
    - from: llm
      to: output
