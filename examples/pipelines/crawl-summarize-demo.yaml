apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: crawl-summarize-demo
spec:
  nodes:
    - id: input
      type: input
    - id: retrieve
      plugin:
        category: datasource
        id: crawl4ai_crawler
        version: "1.0.0"
      config:
        url: "https://www.cnn.com"
        maxPages: 5
        maxDepth: 1
        sameDomainOnly: true
        extract: "markdown"
        timeoutMs: 60000
    - id: prompt
      plugin:
        category: prompt_template
        id: basic_rag_prompt
        version: "1.0.0"
    - id: llm
      plugin:
        category: llm
        id: provider_chat
        version: "1.0.0"
      config:
        provider: "${config.llm.provider}"
        model: "${config.llm.model}"
        baseUrl: "${config.llm.base_url}"
    - id: output
      type: output
  edges:
    - from: input
      to: retrieve
    - from: retrieve
      to: prompt
    - from: prompt
      to: llm
    - from: llm
      to: output
