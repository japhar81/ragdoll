apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: transform-demo
  description: "Reshapes a JSON payload with the transform plugin. One configurable input port fans out to two independently-wired output ports, each computed by its own JSONata expression. Runs with no external services; supply a run input with a payload object holding title, items and tags."
spec:
  nodes:
  - id: input
    type: input
    ui:
      position:
        x: 13.015625
        y: 110
  - id: derive
    plugin:
      category: transformer
      id: transform
      version: 1.0.0
    config:
      engine: jsonata
      inputs:
      - payload
      outputs:
        summary: "payload.title & ' - ' & $string($count(payload.items)) & ' items'"
        keywords: payload.tags
    ui:
      position:
        x: 473.2109375
        y: 110
  - id: out_summary
    type: output
    ui:
      position:
        x: 938.5625
        y: 29
  - id: out_keywords
    type: output
    ui:
      position:
        x: 935.2109375
        y: 191
  edges:
  - from: input
    to: derive
    fromPort: payload
    toPort: payload
  - from: derive
    to: out_summary
    fromPort: summary
    toPort: result
  - from: derive
    to: out_keywords
    fromPort: keywords
    toPort: result
