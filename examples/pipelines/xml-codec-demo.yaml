apiVersion: rag-platform/v1
kind: Pipeline
metadata:
  name: xml-codec-demo
  description: "Parses an XML feed into JSON with xml_codec, then projects the item titles out with a transform (JSONata) node. Runs with no external services; supply a run input with an xml string."
spec:
  nodes:
    - id: input
      type: input
    - id: parse
      plugin:
        category: transformer
        id: xml_codec
        version: "1.0.0"
      config:
        mode: parse
    - id: titles
      plugin:
        category: transformer
        id: transform
        version: "1.0.0"
      config:
        engine: jsonata
        inputs:
          - json
        outputs:
          titles: json.feed.item.title
    - id: output
      type: output
  edges:
    # The run input carries an `xml` string; parse it to JSON.
    - from: input
      to: parse
      fromPort: xml
      toPort: xml
    - from: parse
      to: titles
      fromPort: json
      toPort: json
    - from: titles
      to: output
      fromPort: titles
      toPort: result
