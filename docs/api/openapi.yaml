openapi: 3.1.0
info:
  title: RAGdoll Control Plane API
  version: 0.2.0
  description: >-
    Framework-agnostic control plane implemented in apps/api/src/app.ts and
    served via Fastify in apps/api/src/server.ts. All /api/* routes (except
    the unauthenticated `/healthz`, `/readyz`, `/api/auth/login`,
    `/api/auth/signup`, `/api/auth/providers`, `/api/auth/sso/*` start/callback
    legs, and `/api/triggers/webhook/{token}`) require authentication via
    either `Authorization: Bearer <session-token>` (minted by
    `POST /api/auth/login`) or `Authorization: ApiKey <key>` / `x-api-key`
    (minted by `POST /api/api-keys`, per ADR-0017). The legacy
    DevAuthProvider header fallback has been removed.

    Authorization is enforced per-route via the Casbin-backed RBAC policy
    store (ADR-0011) with hierarchical scope (global / tenant / environment /
    pipeline). Mutating and execution actions write a redacted audit log
    entry. Tenant context is selected via the `x-tenant-id` header on
    callers with multi-tenant grants.

    Pipeline-side schema highlights at this spec version:
      - **Connections** — single unified `connections` table + `/api/connections*`
        REST surface (ADR-0023). The old `external_connections` table and
        `/api/external-connections*` surface have been removed; the
        `external_connection:*` permissions collapsed into `connection:*`.
      - **Datasets** — `bindings.<name>.{connection, collection?, namespace?}`
        replaces `backends.<modality>` (ADR-0023 §2). The Dataset's
        `modalities` field is gone; plugin requirements are stated as
        `requires: [{binding, kind|kindOneOf}]` on each manifest.
      - **Connection drivers** — drivers ship as plugin manifests with
        `category: "connection_driver"` (ADR-0024); enumerated live via
        `GET /api/connection-kinds`.
servers:
  - url: http://localhost:3001
components:
  parameters:
    PipelineRef:
      name: pipeline_id
      in: path
      required: true
      description: >-
        A pipeline UUID OR its slug/name. The web builder POSTs
        `/api/pipelines/<slug>/run`, so every `{pipeline_id}` segment is
        resolved as a UUID first (then by slug); a non-UUID is never passed
        into a uuid query. Unknown -> 404 pipeline_not_found.
      schema: { type: string }
    ForceQuery:
      name: force
      in: query
      required: false
      description: >-
        Cascade-delete opt-in. Default is the cascade-safe posture:
        DELETE refuses with 409 `has_dependents` whenever deleting the
        resource would orphan referencing rows; the response body
        carries `{dependents: {<kind>: <count>, ...}}` so the operator
        sees what's blocking. Re-call with `?force=true` to cascade
        the delete (the route knows its dependents — pipelines under a
        folder, versions under a pipeline, grants holding a role, etc.
        — and cleans them up explicitly before deleting the parent).
      schema:
        type: string
        enum: ["true", "1"]
  responses:
    HasDependents:
      description: >-
        Default DELETE refusal for cascade-aware routes (folders,
        pipelines, datasets, tenants, roles). The route counted
        dependent resources that would be orphaned and refused.
        Caller can retry with `?force=true` to cascade.
      content:
        application/json:
          schema:
            type: object
            required: [error, dependents]
            properties:
              error: { type: string, const: has_dependents }
              message: { type: string }
              dependents:
                type: object
                description: >-
                  Per-kind dependent counts. Keys vary by resource —
                  folders return `{pipelines, subfolders}`; pipelines
                  return `{versions, deployments, activations, schedules,
                  bindings}`; datasets return `{versions, aliases,
                  pipelineReferences}`; tenants return `{pipelineAssociations,
                  datasets, connections, environments, grants}`; roles
                  return `{grants}`. Only non-zero entries are surfaced.
                additionalProperties: { type: integer }
              hint: { type: string, const: "?force=true to cascade" }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, const: unauthorized }
              message: { type: string }
    Forbidden:
      description: Authenticated but lacking the required permission / tenant scope
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, const: forbidden }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, const: not_found }
    PipelineNotFound:
      description: >-
        No pipeline matches the `{pipeline_id}` path segment. That segment
        accepts EITHER a pipeline UUID or its slug/name (the builder POSTs
        `/api/pipelines/<slug>/run`); the API resolves a UUID first, then
        falls back to a slug lookup. When neither matches, this is returned.
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, const: pipeline_not_found }
              message:
                type: string
                description: "e.g. no pipeline with id or slug 'support-rag'"
    InvalidIdentifier:
      description: >-
        A path/identifier value could not be interpreted (e.g. a value
        reaching a typed `uuid` column produced Postgres SQLSTATE 22P02 /
        "invalid input syntax for type uuid"). Returned as a clear 4xx
        instead of a 500.
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, const: invalid_identifier }
              message: { type: string }
    ValidationFailed:
      description: Request body or spec failed validation
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, const: validation_failed }
              issues: { type: array, items: { type: object } }
    Conflict:
      description: >-
        Slug/version conflict, immutable published version, non-empty folder
        delete, duplicate activation label, no active deployment, or an
        activation that cannot be resolved (ambiguous / disabled / missing
        version).
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                enum:
                  [
                    conflict,
                    immutable_version,
                    no_active_deployment,
                    activation_unresolved
                  ]
              message: { type: string }
  schemas:
    JsonSchemaLike:
      description: >-
        Dependency-free JSON-Schema subset describing a plugin's config or
        secrets shape so the UI can render a real form.
      type: object
      properties:
        type: { type: string }
        properties:
          type: object
          additionalProperties: { $ref: "#/components/schemas/JsonSchemaLike" }
        required: { type: array, items: { type: string } }
        items: { $ref: "#/components/schemas/JsonSchemaLike" }
        additionalProperties: { type: boolean }
        description: { type: string }
        enum: { type: array, items: {} }
        default: {}
        format:
          type: string
          description: >-
            Semantic hint. "secret-ref" marks a managed-secret reference; the
            UI renders a secret picker and the value never leaves the server.
    Plugin:
      type: object
      required: [id, name, version, category, description, mode, capabilities]
      properties:
        id: { type: string }
        name: { type: string }
        version: { type: string }
        category: { type: string }
        description: { type: string }
        mode: { type: string }
        capabilities: { type: array, items: { type: string } }
        configSchema: { $ref: "#/components/schemas/JsonSchemaLike" }
        secretsSchema: { $ref: "#/components/schemas/JsonSchemaLike" }
        ui:
          type: object
          properties:
            icon: { type: string }
            color: { type: string }
            formHints: { type: object, additionalProperties: true }
            paletteGroup: { type: string }
            module:
              type: string
              description: >-
                Optional ESM module URL exporting a custom ConfigEditor React
                component (see ADR 0008). Type/contract seam only.
        source:
          type: object
          description: >-
            PLUGIN-ARCH-1 (ADR-0034). Where this plugin's code came
            from. Surfaced on every plugin so the operator sees the
            "from <repo> @ <sha>" provenance.
          required: [repoId, kind]
          properties:
            repoId:
              type: string
              description: Logical id of the source — matches a row in `plugin_sources`, or one of the reserved ids `builtin` / `sample-text`.
            kind: { type: string, enum: [local, git] }
            gitUrl: { type: string }
            ref: { type: string }
            commitSha: { type: string }
            subpath: { type: string }
            loadedAt: { type: string, format: date-time }
            signatureVerified:
              type: boolean
              description: >-
                PLUGIN-ARCH-1 close-out (Build 2). Present when the
                source's `requireSignature` is true AND
                `git verify-commit` passed. Absent for sources that
                don't require signing.
            signedBy:
              type: string
              description: Best-effort signer identity parsed from git's verify-commit stderr (display-only).
    PluginSource:
      type: object
      description: PLUGIN-ARCH-1 (ADR-0034) source catalog row.
      required: [id, kind, enabled, builtin]
      properties:
        id: { type: string }
        kind: { type: string, enum: [local, git] }
        builtin: { type: boolean, description: True for the safety-net rows (`builtin` / `sample-text`). Edit / delete are refused on these. }
        enabled: { type: boolean }
        displayName: { type: string }
        description: { type: string }
        gitUrl:
          type: string
          description: >-
            https / ssh / file:// transports all supported. For a local
            bare repo (testing / air-gapped install) use
            `file:///absolute/path/to/repo.git`; the loader clones with
            `--no-hardlinks` so the cached working copy is immutable
            even if the source repo is modified later.
        ref: { type: string }
        subpath: { type: string }
        lastCommitSha: { type: string }
        lastFetchedAt: { type: string, format: date-time }
        status: { type: string, enum: [loaded, skipped, failed] }
        pluginCount: { type: integer }
        error: { type: string }
        errorStage:
          type: string
          enum: [resolve, clone, install, verify, import, scan, register, disabled]
          description: >-
            Failure stage. `install` covers npm-install failures (the
            install runs `npm ci`/`npm install --omit=dev
            --ignore-scripts`). `verify` covers the
            `requireSignature` path's `git verify-commit` outcome.
    PluginSourceUpsert:
      type: object
      description: Body shape for POST /api/plugins/sources + PATCH /api/plugins/sources/{id}.
      properties:
        id: { type: string, description: "Required on POST; ignored on PATCH (the path id wins)." }
        gitUrl: { type: string }
        ref: { type: string }
        subpath: { type: string }
        displayName: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        requireSignature: { type: boolean }
        allowedSigners:
          type: string
          description: >-
            SSH allowed-signers file content. Used only when
            `requireSignature` is true. Opaque to the API — passed
            verbatim to `gpg.ssh.allowedSignersFile` at verify time.
    PluginRefreshReport:
      type: object
      required: [sources, diff, pluginCount]
      properties:
        sources:
          type: array
          items: { $ref: "#/components/schemas/PluginSource" }
        diff:
          type: object
          required: [added, removed, updated]
          properties:
            added: { type: array, items: { type: string } }
            removed: { type: array, items: { type: string } }
            updated: { type: array, items: { type: string }, description: "Same plugin key, different commit sha." }
        pluginCount: { type: integer }
    PipelineFolder:
      type: object
      required: [id, name, createdAt]
      properties:
        id: { type: string }
        parentId: { type: [string, "null"] }
        name: { type: string }
        createdAt: { type: string }
    PipelineFolderTreeNode:
      allOf:
        - $ref: "#/components/schemas/PipelineFolder"
        - type: object
          properties:
            children:
              type: array
              items: { $ref: "#/components/schemas/PipelineFolderTreeNode" }
    PipelineVersion:
      type: object
      required: [id, pipelineId, version, status, checksum, createdAt]
      properties:
        id: { type: string }
        pipelineId: { type: string }
        version: { type: string }
        status: { type: string, enum: [draft, published, archived] }
        checksum: { type: string }
        parentVersionId:
          type: [string, "null"]
          description: Lineage pointer to the version this one was saved on top of.
        isLatest:
          type: boolean
          description: True when pipeline.latestVersionId points at this row.
        spec: { type: object }
        createdAt: { type: string }
        publishedAt: { type: [string, "null"] }
    Activation:
      type: object
      required: [id, label, environment, trackLatest, enabled]
      properties:
        id: { type: string }
        label: { type: string }
        environment: { type: string }
        pipelineVersionId:
          type: [string, "null"]
          description: Pinned version (null when trackLatest is true).
        trackLatest:
          type: boolean
          description: When true the activation follows pipeline.latestVersionId.
        enabled: { type: boolean }
        effectiveVersionId:
          type: [string, "null"]
          description: >-
            Concrete pipeline_version id this activation resolves to right now
            (pinned id, or the pipeline's latest id when trackLatest). Null when
            unresolvable.
    Schedule:
      type: object
      required:
        [id, tenantId, pipelineId, environment, cron, timezone, enabled, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        pipelineId: { type: string }
        environment: { type: string }
        activationLabel: { type: [string, "null"] }
        cron: { type: string, description: 5-field Vixie/POSIX cron expression. }
        timezone: { type: string, default: UTC }
        input: { type: object }
        enabled: { type: boolean }
        lastRunAt: { type: [string, "null"] }
        nextRunAt:
          type: [string, "null"]
          description: Computed via nextAfter(cron, now) on create / cron change.
        createdAt: { type: string }
    Dataset:
      type: object
      description: >-
        First-class corpus resource (Phase 4, rewritten by ADR-0023).
        Scope = global | tenant | environment. Resolution at reference
        time walks env → tenant → global, narrowest match wins.

        Backends are described as named `bindings` (ADR-0023 §2) — the
        legacy `modalities[]` + `backends.<modality>` shape was removed
        by migration 021. A retrieval plugin declaring
        `requires: [{binding: "vectors", kind: "qdrant"}]` matches
        only datasets that have a `vectors` binding pointing at a
        qdrant connection.
      required: [id, scope, slug, displayName, bindings, createdAt, updatedAt]
      properties:
        id: { type: string }
        scope: { type: string, enum: [global, tenant, environment] }
        tenantId: { type: [string, "null"] }
        environmentId: { type: [string, "null"] }
        slug: { type: string }
        displayName: { type: string }
        description: { type: [string, "null"] }
        embeddingProfile: { type: object }
        chunkSchema: { type: object }
        bindings:
          type: object
          description: >-
            Map of binding NAME (free text, plugin-declared) → binding
            spec. Each binding points at one connection slug; collection
            and namespace are optional overrides (when omitted the
            runtime defaults the collection to
            `${dataset-slug}_${binding}_v${version}`).
          additionalProperties:
            type: object
            required: [connection]
            properties:
              connection:
                type: string
                description: Connection slug (env → tenant → global cascade).
              collection:
                type: [string, "null"]
                description: Optional collection / index / table name override.
              namespace:
                type: [string, "null"]
                description: >-
                  Optional namespace policy (e.g. `by-tenant`) for backends
                  that scope writes by appending a per-tenant suffix.
        currentVersionId: { type: [string, "null"] }
        archivedAt: { type: [string, "null"] }
        createdAt: { type: string }
        createdBy: { type: [string, "null"] }
        updatedAt: { type: string }
    DatasetVersion:
      type: object
      required: [id, datasetId, versionLabel, status, createdAt]
      properties:
        id: { type: string }
        datasetId: { type: string }
        versionLabel: { type: string }
        schemaSpec: { type: object }
        status: { type: string, enum: [building, ready, archived] }
        docCount: { type: [integer, string] }
        sizeBytes: { type: [integer, string] }
        createdAt: { type: string }
        readyAt: { type: [string, "null"] }
    DatasetAlias:
      type: object
      required: [id, datasetId, alias, versionId, updatedAt]
      properties:
        id: { type: string }
        datasetId: { type: string }
        alias: { type: string, description: "e.g. stable, staging, canary" }
        versionId: { type: string }
        updatedAt: { type: string }
        updatedBy: { type: [string, "null"] }
    DatasetBindingOverride:
      type: object
      description: >-
        Per-(pipeline, tenant, environment) override that pins a
        pipeline-level dataset binding to a specific dataset slug.
        Without an override, the pipeline-spec binding defaults stand;
        with one, the resolver dispatches to the override's
        `datasetSlug` for runs scoped to that tenant + environment.
      required: [id, pipelineId, tenantId, environmentId, bindingId, datasetSlug, createdAt, updatedAt]
      properties:
        id: { type: string }
        pipelineId: { type: string }
        tenantId: { type: string }
        environmentId: { type: string }
        bindingId:
          type: string
          description: Pipeline-level binding id (`spec.bindings[].id`).
        datasetSlug: { type: string }
        datasetAlias: { type: [string, "null"], description: "Optional alias pin." }
        createdAt: { type: string }
        updatedAt: { type: string }
    Connection:
      type: object
      description: >-
        Unified Connections registry row (ADR-0023 §1). Supersedes the
        ADR-0021 `external_connections` + ADR-0020 `datasource_connections`
        tables, both of which were dropped by migration 019. One scope
        cascade (env → tenant → global), one set of permissions
        (`connection:{read,admin,use}`), one probe job.
      required: [id, scope, slug, displayName, kind, config, allowedHosts, denyPrivateNetworks, createdAt, updatedAt]
      properties:
        id: { type: string }
        scope: { type: string, enum: [global, tenant, environment] }
        tenantId: { type: [string, "null"] }
        environmentId: { type: [string, "null"] }
        slug:
          type: string
          description: Operator-facing handle. Resolved via the env → tenant → global cascade.
        displayName: { type: string }
        description: { type: [string, "null"] }
        kind:
          type: string
          description: >-
            Driver kind string. Open-ended; the driver-plugin registry
            (ADR-0024) declares which kinds are loaded and what their
            config / secret schemas look like. Use `GET /api/connection-kinds`
            for the live catalog.
        config:
          type: object
          description: Non-secret per-kind config (host, port, database, …). Schema lives on the driver manifest.
        secretRefKey:
          type: [string, "null"]
          description: >-
            Logical key into the managed-secrets registry — resolved at
            execute time against `secret_refs.logical_key` via the
            SecretProvider. Plaintext never leaves the server. The
            column is `text` (any handle the secrets backend accepts is
            valid; not constrained to UUID). Null when the connection
            has no credential (no-auth backends).
        allowedHosts:
          type: array
          items: { type: string }
          description: SSRF allowlist. Empty array = no restriction.
        denyPrivateNetworks:
          type: boolean
          description: When true, RFC-1918 / link-local addresses are refused regardless of `allowedHosts`.
        lastProbedAt: { type: [string, "null"] }
        lastProbeOk: { type: [boolean, "null"] }
        lastProbeError: { type: [string, "null"] }
        archivedAt: { type: [string, "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
    ConnectionKind:
      type: object
      description: >-
        Entry in the live driver-plugin catalog (ADR-0024). The
        Connections UI renders the per-kind config form from
        `configSchema`; the dataset binding picker filters by
        `datasetBindings` to surface only kinds that can fill the
        plugin's requested binding.
      required: [kind, displayName, configSchema, transport]
      properties:
        kind: { type: string, description: "Globally unique kind string (e.g. qdrant, postgres, snowflake)." }
        displayName: { type: string }
        description: { type: [string, "null"] }
        configSchema: { $ref: "#/components/schemas/JsonSchemaLike" }
        secretSchema:
          oneOf:
            - { $ref: "#/components/schemas/JsonSchemaLike" }
            - { type: "null" }
        datasetBindings:
          type: array
          items: { type: string }
          description: Binding names this kind can fill (empty array = tool-only).
        transport:
          type: string
          enum: [in_process, external]
          description: In-process driver (bundled) vs. Connect-RPC sidecar (ADR-0022).
    ApiKey:
      type: object
      description: >-
        Personal API key minted via `POST /api/api-keys` (ADR-0017).
        The plaintext (`rgd_<prefix>_<secret>`) is returned only at
        creation time; subsequent reads expose `prefix` only.
      required: [id, prefix, displayName, createdAt]
      properties:
        id: { type: string }
        prefix:
          type: string
          description: Public prefix shown next to the key in the UI (matches the first segment of the plaintext).
        displayName: { type: string }
        createdAt: { type: string }
        lastUsedAt: { type: [string, "null"] }
        revokedAt: { type: [string, "null"] }
        scope:
          type: [string, "null"]
          description: Optional tenant scope when minted by a tenant-scoped principal.
    Environment:
      type: object
      description: Named environment under a tenant (e.g. dev, staging, prod).
      required: [id, tenantId, name, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        name: { type: string, description: "Environment label (alphanumeric + hyphens)." }
        description: { type: [string, "null"] }
        createdAt: { type: string }
    RetentionSetting:
      type: object
      description: Per-resource retention policy. `resource` is `executions` / `audit_logs` / `usage_records`.
      required: [resource, retentionDays, updatedAt]
      properties:
        resource: { type: string, enum: [executions, audit_logs, usage_records] }
        retentionDays:
          type: [integer, "null"]
          description: Null = keep forever; integer = age in days at which a janitor sweep deletes rows.
        updatedAt: { type: string }
        updatedBy: { type: [string, "null"] }

    # --- Core resources (response shapes) -----------------------------------
    # Added so every 2xx documents a body instead of a bare description.
    # Shapes mirror the repository row types in packages/db/src/types.ts.

    Tenant:
      type: object
      description: An isolation boundary. Every pipeline run, secret, and dataset resolves within one tenant.
      required: [id, slug, name, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        status: { type: string }
        metadata: { type: object, additionalProperties: true }
        storageMode: { type: string, enum: [db, git] }
        createdAt: { type: string }
        updatedAt: { type: string }

    Pipeline:
      type: object
      description: A pipeline's mutable header. The DAG itself lives on its versions.
      required: [id, slug, name, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        description: { type: [string, "null"] }
        labels: { type: object, additionalProperties: { type: string } }
        folderId: { type: [string, "null"], format: uuid }
        latestVersionId: { type: [string, "null"], format: uuid }
        createdBy: { type: [string, "null"], format: uuid }
        createdAt: { type: string }
        updatedAt: { type: string }

    PipelineDeployment:
      type: object
      description: Binds one pipeline version to an environment (optionally per tenant).
      required: [id, pipelineId, pipelineVersionId, environment, status, deployedAt]
      properties:
        id: { type: string, format: uuid }
        pipelineId: { type: string, format: uuid }
        pipelineVersionId: { type: string, format: uuid }
        environment: { type: string }
        tenantId: { type: [string, "null"], format: uuid }
        status: { type: string }
        deployedBy: { type: [string, "null"], format: uuid }
        deployedAt: { type: string }

    Execution:
      type: object
      description: One pipeline run. `parentExecutionId` is set when the run was invoked as a step by another pipeline (pipeline_call).
      required: [executionId, tenantId, pipelineId, pipelineVersionId, environment, status, startedAt]
      properties:
        executionId: { type: string }
        tenantId: { type: string, format: uuid }
        pipelineId: { type: string, format: uuid }
        pipelineVersionId: { type: string, format: uuid }
        environment: { type: string }
        status: { type: string, enum: [running, succeeded, failed, cancelled, denied] }
        startedAt: { type: string }
        completedAt: { type: string }
        input: {}
        output: {}
        error: { type: string }
        actorId: { type: [string, "null"], format: uuid }
        parentExecutionId:
          type: [string, "null"]
          description: Parent run's executionId when invoked as a step; null for a top-level run.

    ExecutionNode:
      type: object
      description: Per-node record within an execution's trace.
      required: [executionId, nodeId, status, startedAt]
      properties:
        executionId: { type: string }
        nodeId: { type: string }
        status: { type: string, enum: [running, succeeded, failed, skipped] }
        startedAt: { type: string }
        completedAt: { type: string }
        latencyMs: { type: integer }

    User:
      type: object
      required: [id, email, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: [string, "null"] }
        status: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    Role:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, "null"] }

    Grant:
      type: object
      description: Binds a user to a role at a scope (`g` global, `t/<tenantId>`, `t/<tenantId>/e/<env>`, …).
      required: [id, userId, role, scope, createdAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        role: { type: string }
        scope: { type: string }
        createdAt: { type: string }

    SecretMetadata:
      type: object
      description: Secret METADATA only — the value is never returned by any read endpoint.
      required: [id, key, scope]
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        scope: { type: string, enum: [global, tenant, environment] }
        tenantId: { type: [string, "null"], format: uuid }
        environment: { type: [string, "null"] }
        version: { type: integer }
        createdAt: { type: string }
        updatedAt: { type: string }

    AuditLog:
      type: object
      required: [id, action, targetType, targetId, createdAt]
      properties:
        id: { type: string, format: uuid }
        actorId: { type: [string, "null"], format: uuid }
        tenantId: { type: [string, "null"], format: uuid }
        pipelineId: { type: [string, "null"], format: uuid }
        action: { type: string }
        targetType: { type: string }
        targetId: { type: string }
        beforeRedacted: {}
        afterRedacted: {}
        requestId: { type: [string, "null"] }
        sourceIp: { type: [string, "null"] }
        userAgent: { type: [string, "null"] }
        createdAt: { type: string }

    UsageRecord:
      type: object
      required: [id, tenantId, inputTokens, outputTokens, embeddingTokens, estimatedCostUsd, success, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        pipelineId: { type: [string, "null"], format: uuid }
        executionId: { type: [string, "null"] }
        provider: { type: [string, "null"] }
        model: { type: [string, "null"] }
        inputTokens: { type: integer }
        outputTokens: { type: integer }
        embeddingTokens: { type: integer }
        estimatedCostUsd: { type: number }
        latencyMs: { type: [integer, "null"] }
        success: { type: boolean }
        createdAt: { type: string }

    ConfigDefinition:
      type: object
      description: Declares a config key — its type, where it may be set, and how it validates.
      required: [key, type, allowedScopes]
      properties:
        key: { type: string }
        type: { type: string }
        defaultValue: {}
        allowedScopes: { type: array, items: { type: string } }
        required: { type: boolean }
        secret: { type: boolean }
        sensitive: { type: boolean }
        overridable: { type: boolean }
        inherited: { type: boolean }
        nullable: { type: boolean }
        tenantOverridable: { type: boolean }
        runtimeOverridable: { type: boolean }
        validation: { type: object, additionalProperties: true }

    ConfigValue:
      type: object
      description: A config value bound at one scope. Values for `secret` definitions are redacted on read.
      required: [id, key, scope]
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        value: {}
        scope: { type: string }
        scopeId: { type: [string, "null"] }
        locked: { type: boolean }
        createdBy: { type: [string, "null"], format: uuid }
        createdAt: { type: string }
        updatedAt: { type: string }

    IdentityProvider:
      type: object
      description: A configured SSO provider (inbound auth). Secrets inside `config` are redacted on read.
      required: [id, slug, kind, displayName, enabled]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        kind: { type: string }
        displayName: { type: string }
        enabled: { type: boolean }
        config: { type: object, additionalProperties: true }
        createdAt: { type: string }
        updatedAt: { type: string }

    EventSubscription:
      type: object
      description: A webhook subscription to platform events (ADR 0036). `secret` is write-only and never returned.
      required: [id, events, phases, url, active]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: [string, "null"], format: uuid }
        events: { type: array, items: { type: string } }
        phases: { type: array, items: { type: string, enum: [pre, post] } }
        url: { type: string, format: uri }
        active: { type: boolean }
        description: { type: [string, "null"] }
        createdBy: { type: [string, "null"], format: uuid }
        createdAt: { type: string }

    WebhookDeliveryFailure:
      type: object
      description: A dead-lettered webhook delivery, retained for inspection + replay.
      required: [id, eventName, url, attempts, failedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: [string, "null"], format: uuid }
        subscriptionId: { type: [string, "null"], format: uuid }
        eventName: { type: string }
        url: { type: string, format: uri }
        event: { type: object, additionalProperties: true }
        lastError: { type: [string, "null"] }
        attempts: { type: integer }
        failedAt: { type: string }
        replayedAt: { type: [string, "null"] }

    PipelineTrigger:
      type: object
      description: A webhook trigger. The token is returned ONCE at creation; only its prefix + hash are stored.
      required: [id, tenantId, pipelineId, environment, name, prefix, enabled]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        pipelineId: { type: string, format: uuid }
        environment: { type: string }
        activationLabel: { type: [string, "null"] }
        name: { type: string }
        prefix: { type: string }
        enabled: { type: boolean }
        createdBy: { type: [string, "null"], format: uuid }
        createdAt: { type: string }

    ExecutionAccepted:
      type: object
      description: Async run acknowledgement — the run is queued, poll `/api/executions/{id}` for terminal state.
      required: [executionId, pipelineId]
      properties:
        executionId: { type: string }
        jobId: { type: string }
        pipelineId: { type: string, format: uuid }
        pipelineVersionId: { type: string, format: uuid }
        version: { type: string }
        environment: { type: string }
        status: { type: string }
        resolvedVia: { type: string }
        activationLabel: { type: string }

    PipelineValidationResult:
      type: object
      description: "Spec validation outcome. `valid: false` carries the per-issue list."
      required: [valid]
      properties:
        valid: { type: boolean }
        errors:
          type: array
          items:
            type: object
            properties:
              message: { type: string }
              path: { type: string }
              nodeId: { type: string }

    AuthSettings:
      type: object
      required: [signupMode]
      properties:
        signupMode: { type: string, enum: [admin_only, open_default_role, open_no_access] }
        defaultRole: { type: [string, "null"] }

    Principal:
      type: object
      description: The resolved caller identity + effective permissions for this request.
      properties:
        id: { type: string }
        type: { type: string, enum: [user, service, api_key] }
        tenantId: { type: [string, "null"], format: uuid }
        roles: { type: array, items: { type: string } }

    Provider:
      type: object
      description: A registered LLM / embedding provider.
      required: [id]
      properties:
        id: { type: string }
        displayName: { type: string }
        kinds: { type: array, items: { type: string } }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  /healthz:
    get:
      summary: Liveness probe (public, unauthenticated)
      security: []
      responses:
        "200":
          description: "Alive"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
  /readyz:
    get:
      summary: Readiness probe (public, unauthenticated)
      security: []
      responses:
        "200":
          description: "Ready"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  checks: { type: object, additionalProperties: true }

  /api/tenants:
    get:
      summary: List tenants (platform_admin sees all; others see own tenant)
      responses:
        "200":
          description: "Tenant list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants: { type: array, items: { $ref: "#/components/schemas/Tenant" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create tenant
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/tenants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get tenant
      responses:
        "200":
          description: "Tenant"
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: "#/components/schemas/Tenant" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update tenant
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant: { $ref: "#/components/schemas/Tenant" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: >-
        Delete tenant. Default: refuses with 409 `has_dependents` when
        the tenant still owns pipeline associations, datasets, connections,
        environments, or RBAC grants scoping users into it. `?force=true`
        explicitly removes the tenant-scoped grants, then deletes the
        tenant (the rest of the FK chain — audit_logs / usage / executions /
        secrets / schedules / git config / environments / tenant_pipelines /
        connections — cascades automatically per migrations 001-019).
      parameters:
        - $ref: "#/components/parameters/ForceQuery"
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/HasDependents" }

  /api/pipelines:
    get:
      summary: List pipelines
      responses:
        "200":
          description: "Pipeline list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines: { type: array, items: { $ref: "#/components/schemas/Pipeline" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create pipeline (optionally inside a folder)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name]
              properties:
                slug: { type: string }
                name: { type: string }
                description: { type: string }
                labels: { type: object, additionalProperties: { type: string } }
                folderId:
                  type: [string, "null"]
                  description: Optional folder to create the pipeline in.
      responses:
        "201":
          description: >-
            Created. The pipeline response now also carries folderId and
            latestVersionId (both null until set via /folder or /save).
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline: { $ref: "#/components/schemas/Pipeline" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/pipelines/{pipeline_id}:
    parameters:
      - name: pipeline_id
        in: path
        required: true
        description: >-
          A pipeline UUID OR its slug/name. Resolved as a UUID first, then
          by slug. A non-UUID is never passed into a uuid query.
        schema: { type: string }
    get:
      summary: Get pipeline (by id or slug)
      responses:
        "200":
          description: "Pipeline"
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline: { $ref: "#/components/schemas/Pipeline" }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
    put:
      summary: Update pipeline (by id or slug)
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline: { $ref: "#/components/schemas/Pipeline" }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
    delete:
      summary: >-
        Delete pipeline (by id or slug). Cascade-aware: refuses with
        409 `has_dependents` when versions / deployments / activations /
        schedules / bindings reference it; `?force=true` cascades the
        delete via the FK chain (versions → deployments → activations →
        schedules → triggers → bindings).
      parameters:
        - $ref: "#/components/parameters/ForceQuery"
      responses:
        "204": { description: Deleted }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "409": { $ref: "#/components/responses/HasDependents" }
  /api/folders:
    get:
      summary: Nested pipeline-folder tree (root nodes with children[])
      responses:
        "200":
          description: Folder forest
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items: { $ref: "#/components/schemas/PipelineFolderTreeNode" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                parentId: { type: [string, "null"] }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  folder: { $ref: "#/components/schemas/PipelineFolder" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/folders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      summary: Rename and/or reparent a folder
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                parentId: { type: [string, "null"] }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  folder: { $ref: "#/components/schemas/PipelineFolder" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: >-
        Delete a folder. Default: refuses with 409 `has_dependents` when
        the folder contains pipelines or sub-folders, listing the
        counts. `?force=true` recursively nukes every pipeline + folder
        in the sub-tree (bottom-up).
      parameters:
        - $ref: "#/components/parameters/ForceQuery"
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/HasDependents" }
  /api/pipelines/{pipeline_id}/folder:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    put:
      summary: Move a pipeline (by id or slug) into a folder (or root with folderId=null)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folderId]
              properties:
                folderId: { type: [string, "null"] }
      responses:
        "200":
          description: "Pipeline (with updated folderId)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline: { $ref: "#/components/schemas/Pipeline" }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /api/pipelines/validate:
    post:
      summary: Validate a pipeline spec (JSON object or JSON/YAML string)
      description: >-
        Returns the PipelineValidationResult envelope (same shape the
        Builder uses to light canvas badges). Pass `x-tenant-id` so the
        validator can build a binding index from the caller's visible
        datasets + connections — that catches `dataset_binding_kind_mismatch`
        (a node requires `kindOneOf: [neo4j]` on its binding but the bound
        dataset's connection is a different kind) at validate time
        instead of at run time.
      responses:
        "200":
          description: "PipelineValidationResult"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineValidationResult"
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/pipelines/{pipeline_id}/validation:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    get:
      summary: >-
        Per-pipeline validator. Returns the same PipelineValidationResult
        envelope `POST /api/pipelines/validate` produces, but fetches the
        spec server-side so a provisioning script can detect issues on an
        already-provisioned pipeline without resending its spec. Defaults
        to the pipeline's latest version; pin to a specific one via
        `?version=X.Y.Z`. This is the API surface for the same diagnostics
        the Builder uses to light canvas badges.
      parameters:
        - name: version
          in: query
          required: false
          description: Pin validation to a specific pipeline version. Defaults to the latest.
          schema: { type: string }
      responses:
        "200":
          description: >-
            { pipelineId, pipelineSlug, version, versionId, valid, errors,
            warnings, requiredSecrets, requiredConfig, missingPlugins,
            datasetSlots }
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelineId: { type: string, format: uuid }
                  pipelineSlug: { type: string }
                  version: { type: string }
                  versionId: { type: string, format: uuid }
                  valid: { type: boolean }
                  errors: { type: array, items: { type: object, additionalProperties: true } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: >-
            Pipeline (or specified version) not found. The latter case
            includes pipelines that have no saved versions yet — the
            response message distinguishes which case applies.
  /api/pipelines/{pipeline_id}/versions:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    get:
      summary: >-
        List pipeline versions. Each row is flagged isLatest (against
        pipeline.latestVersionId) and carries parentVersionId lineage. The
        envelope also returns latestVersionId.
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items: { $ref: "#/components/schemas/PipelineVersion" }
                  latestVersionId: { type: [string, "null"] }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
    post:
      summary: >-
        Save a draft (mutable) or publish an immutable version. Set
        body.publish=true to publish. Republishing identical content is
        idempotent (200); republishing changed content under a published
        version returns 409 immutable_version. (Back-compat route; new clients
        should prefer POST /save for auto-versioned saves.)
      responses:
        "201":
          description: "Draft created / version published"
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { $ref: "#/components/schemas/PipelineVersion" }
        "200":
          description: "Idempotent republish or draft re-save"
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { $ref: "#/components/schemas/PipelineVersion" }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/pipelines/{pipeline_id}/save:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    post:
      summary: >-
        Auto-versioned save. Validates the spec, then via nextVersionOnSave:
        if the spec is identical to the current latest version it is
        idempotent (200, created:false, no new row, pointer unchanged);
        otherwise a new published version is created (201, created:true) whose
        number is the GLOBAL max version bumped by level (default patch),
        parentVersionId links to the previous latest, and
        pipeline.latestVersionId is advanced to the new row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec]
              properties:
                spec:
                  description: PipelineSpec object, or a JSON/YAML spec string.
                  oneOf:
                    - type: object
                    - type: string
                level:
                  type: string
                  enum: [patch, minor, major]
                  default: patch
      responses:
        "200":
          description: Idempotent (created:false), unchanged latest returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { $ref: "#/components/schemas/PipelineVersion" }
                  versionLabel:
                    type: string
                    description: Convenience copy of version.version (the semver). Saves callers a `.version.version` dereference.
                  created: { type: boolean, const: false }
        "201":
          description: New version created (created:true), latest pointer advanced
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { $ref: "#/components/schemas/PipelineVersion" }
                  versionLabel:
                    type: string
                    description: Convenience copy of version.version (the semver). Saves callers a `.version.version` dereference.
                  created: { type: boolean, const: true }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/pipelines/{pipeline_id}/save-and-deploy:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    post:
      summary: >-
        Atomic publish + activate. Same auto-versioned save as `/save`,
        immediately followed by an `upsertActive` deployment row for the
        given (environment, tenantId). Use this from provisioning
        scripts so a clean instance can go from "I have a spec" to
        "live in env X" in one round-trip — the two-call dance through
        `/save` then `/deployments` was the source of a class of
        `no_active_deployment` 409s on the second hop.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec, environment]
              properties:
                spec:
                  description: PipelineSpec object, or a JSON/YAML spec string.
                  oneOf:
                    - type: object
                    - type: string
                level:
                  type: string
                  enum: [patch, minor, major]
                  default: patch
                environment: { type: string }
                tenantId:
                  type: [string, "null"]
                  description: Tenant scope for the deployment. Null = global deployment.
      responses:
        "201":
          description: Saved + deployed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { $ref: "#/components/schemas/PipelineVersion" }
                  versionLabel: { type: string }
                  created: { type: boolean }
                  deployment: { type: object }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/pipelines/{pipeline_id}/rollback:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    post:
      summary: >-
        Move pipeline.latestVersionId to an existing version (pointer move
        only; creates NO new version row). Unknown versionId returns 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [versionId]
              properties:
                versionId: { type: string }
      responses:
        "200":
          description: Pointer moved
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline: { type: object }
                  latestVersionId: { type: string }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/pipelines/{pipeline_id}/versions/{version}/archive:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
      - name: version
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Archive a pipeline version (pipeline by id or slug)
      responses:
        "200":
          description: "Archived version"
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { $ref: "#/components/schemas/PipelineVersion" }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
  /api/pipelines/{pipeline_id}/versions/{version}/export:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
      - name: version
        in: path
        required: true
        schema: { type: string }
      - name: format
        in: query
        schema: { type: string, enum: [json, yaml] }
    get:
      summary: Export a version spec as json or yaml (pipeline by id or slug)
      responses:
        "200":
          description: "Serialized spec"
          content:
            application/json:
              schema:
                type: object
                properties:
                  spec: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
  /api/pipelines/{pipeline_id}/deployments:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    get:
      summary: List deployments (pipeline by id or slug)
      responses:
        "200":
          description: "Deployment list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployments: { type: array, items: { $ref: "#/components/schemas/PipelineDeployment" } }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
    post:
      summary: Deploy a published version (optionally tenant-scoped; pipeline by id or slug)
      responses:
        "201":
          description: "Deployment created"
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment: { $ref: "#/components/schemas/PipelineDeployment" }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/pipelines/{pipeline_id}/deployments/{envOrId}:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
      - name: envOrId
        in: path
        required: true
        schema: { type: string }
        description: >-
          Either an environment NAME (drops every deployment of this
          pipeline in that env — matches "stop running in dev" mental
          model) OR a deployment row UUID (drops that single row).
          Detected by canonical UUID shape; everything else is treated
          as an environment name.
      - name: tenantId
        in: query
        required: false
        schema: { type: string, format: uuid }
        description: >-
          When `envOrId` is an environment name, narrows the delete to
          a single tenant's deployment. Omit for the NULL-tenant /
          global deployment row.
    delete:
      summary: >-
        Delete a deployment. Required because environments come and
        go (when a tenant removes its `dev` env, the matching
        deployment rows would otherwise linger with no live target).
        DELETE on the environment itself cascades through this same
        path automatically.
      responses:
        "200":
          description: Number of rows removed (and the removed row for the UUID form).
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: integer }
                  deployment: { type: object }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: No deployment matched the env-or-id path.
  /api/pipelines/{pipeline_id}/run:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    post:
      summary: >-
        Resolve the target pipeline version, validate, enqueue a run_pipeline
        job, seed a queued execution record, and return 202. Resolution
        precedence: (1) if the tenant has ANY activation for
        (tenant,pipeline,environment), resolve via
        resolveActivation(body.activation?) then
        effectiveVersionId(activation, pipeline.latestVersionId) — ambiguous /
        disabled / unresolvable activations return 409 activation_unresolved;
        (2) otherwise fall back to the existing deployment path (409
        no_active_deployment when none). The enqueued job payload keeps today's
        shape plus tenantId/pipelineId/environment and, when resolved via an
        activation, activationLabel. The {pipeline_id} segment accepts the
        pipeline UUID OR its slug/name (the builder POSTs
        `/api/pipelines/<slug>/run`); the resolved real UUID is used for all
        downstream version/deployment/activation lookups.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input: {}
                environment: { type: string, default: dev }
                activation:
                  type: string
                  description: >-
                    Optional activation label. When omitted and activations
                    exist, the "default" label or a single enabled activation
                    is used; multiple enabled with no label/default => 409.
      responses:
        "202":
          description: >-
            Execution accepted. Body: executionId, jobId, pipelineId,
            pipelineVersionId, version, status:"accepted", resolvedVia
            ("activation" | "deployment"), and activationLabel when resolved
            via an activation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionAccepted"
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/pipelines/{pipeline_id}/ingest:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    post:
      summary: Enqueue an ingest_datasource job for the deployed version (pipeline by id or slug)
      responses:
        "202":
          description: "Ingestion accepted (jobId)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/pipelines/{pipeline_id}/invoke:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    post:
      summary: >-
        Synchronous in-process execution (Phase 8). Runs the DAG on the
        API pod and returns the terminal output in one HTTP round-trip
        — required for chat-style retrieval and MCP tool exposure.
        Pipelines SHOULD declare `metadata.executionKind: "synchronous"`
        to be invoked here; batch pipelines aren't rejected but are
        unusual on this surface.
      responses:
        "200":
          description: Pipeline ran to completion; output in the response body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  executionId: { type: string }
                  pipelineId: { type: string }
                  pipelineVersionId: { type: string }
                  version: { type: string }
                  status: { type: string, const: succeeded }
                  output: { type: object }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "500":
          description: Execution failed (plugin error, missing dataset, etc.)
  /api/pipelines/{pipeline_id}/stream:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    post:
      summary: >-
        Server-Sent Events wrapper for synchronous execution (Phase 8 +
        Phase 13). Emits `execution.started` immediately, runs the DAG
        in-process, then yields `execution.completed`, `output`, and
        `done` (or `execution.failed` + `error` on error). Real
        chunked delivery — frames stream as they're produced.
      responses:
        "200":
          description: text/event-stream of lifecycle frames.
          content:
            text/event-stream: {}
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  # --- Datasets (Phase 4 of the dataset/RBAC/retrieval refactor) ---
  /api/datasets:
    get:
      summary: >-
        List Datasets visible at the request scope (`x-tenant-id` +
        `x-environment` headers). Returns the union of: globals,
        tenant-scoped (for the given tenant), env-scoped (for the
        given tenant + env). Archived rows excluded by default — pass
        `?include_archived=true` to include them (powers the admin
        screen's "show archived" toggle).
      parameters:
        - name: include_archived
          in: query
          required: false
          schema: { type: boolean }
          description: >-
            When `true` (also accepts `1` / `yes`), archived datasets
            are included. Runtime callers (pipeline dataset resolution)
            never set this — archived rows must never surface to a
            live pipeline.
      responses:
        "200":
          description: List of datasets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  datasets:
                    type: array
                    items: { $ref: "#/components/schemas/Dataset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: >-
        Create a Dataset at one of three scopes (global / tenant /
        environment). Caller needs `dataset:admin` at the target scope.
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataset: { $ref: "#/components/schemas/Dataset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/datasets/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Fetch a single Dataset by id.
      responses:
        "200":
          description: Dataset
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dataset" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: >-
        Update Dataset metadata (displayName / description / schema /
        bindings) or toggle archived. Caller needs `dataset:admin` at
        the dataset's scope.
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataset: { $ref: "#/components/schemas/Dataset" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: >-
        Remove a Dataset. Default: refuses with 409 `has_dependents`
        when versions, aliases, or pipeline specs reference the
        dataset's slug (the route walks pipeline specs the same way
        `GET /:id/used-by` does, so the count matches). `?force=true`
        deletes anyway — versions + aliases cascade via FK, but
        pipeline specs that embed `node.dataset.slug` become dangling
        references and fail at execute time (operator opt-in).
      parameters:
        - $ref: "#/components/parameters/ForceQuery"
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/HasDependents" }
  /api/datasets/{id}/versions:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: List the dataset's versions + aliases.
      responses:
        "200":
          description: Versions + aliases
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items: { $ref: "#/components/schemas/DatasetVersion" }
                  aliases:
                    type: array
                    items: { $ref: "#/components/schemas/DatasetAlias" }
    post:
      summary: >-
        Cut a new version. First version auto-pins `currentVersionId`
        and creates the `stable` alias.
      responses:
        "201":
          description: "Version created"
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { $ref: "#/components/schemas/DatasetVersion" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/datasets/{id}/aliases/{alias}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: alias
        in: path
        required: true
        schema: { type: string }
    patch:
      summary: >-
        Atomically retarget an alias to a different version of the
        same dataset (canary rollout).
      responses:
        "200":
          description: "Alias retargeted"
          content:
            application/json:
              schema:
                type: object
                properties:
                  alias: { $ref: "#/components/schemas/DatasetAlias" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/datasets/{id}/used-by:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: >-
        Back-references for a dataset — every pipeline whose spec or
        binding override targets this dataset slug. Used by the Archive
        flow's "what just broke?" guard.
      responses:
        "200":
          description: List of pipelines + version refs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines:
                    type: array
                    items:
                      type: object
                      properties:
                        pipelineId: { type: string }
                        pipelineSlug: { type: string }
                        bindingIds:
                          type: array
                          items: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Unified Connections registry (ADR-0023 + ADR-0024) ---
  /api/connection-kinds:
    get:
      summary: >-
        Live catalog of loaded driver plugins (ADR-0024). One entry per
        registered kind, each carrying the `configSchema` the Connections
        UI renders the per-kind form from and the `datasetBindings` the
        binding picker filters on.
      responses:
        "200":
          description: Loaded driver-plugin catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  kinds:
                    type: array
                    items: { $ref: "#/components/schemas/ConnectionKind" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/connections:
    get:
      summary: >-
        List Connections visible at the request scope (`x-tenant-id` +
        `x-environment` headers). Returns the union of globals,
        tenant-scoped (for the given tenant), and env-scoped (for the
        tenant + env). Archived rows are excluded by default — pass
        `?include_archived=true` to include them (the admin
        "show archived" toggle in the UI does this).
      parameters:
        - name: include_archived
          in: query
          required: false
          schema: { type: boolean }
          description: >-
            When `true` (also accepts `1` / `yes`), archived rows are
            included alongside active ones. Cascade-resolve paths
            (datasets / pipeline-binding lookup) never set this.
      responses:
        "200":
          description: List of connections.
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: array
                    items: { $ref: "#/components/schemas/Connection" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: >-
        Create a Connection at one of three scopes (global / tenant /
        environment). Caller needs `connection:admin` at the target scope.
        The optional `secretRefKey` is a logical key into the managed-
        secrets registry; the caller must have read access to the
        underlying secret.
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection: { $ref: "#/components/schemas/Connection" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/connections/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Fetch a single Connection.
      responses:
        "200":
          description: Connection
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection: { $ref: "#/components/schemas/Connection" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: >-
        Update a Connection's metadata / config / secret pointer /
        SSRF allowlist. Caller needs `connection:admin` at the row's scope.
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection: { $ref: "#/components/schemas/Connection" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: >-
        Default: soft-archive the Connection (sets `archivedAt`; row
        remains so historical execution traces still resolve their
        connection envelope; UI filters archived from primary listings).
        With `?force=true`: HARD-delete the row + drop the pooled
        client. Force-delete refuses with 409 `has_dependents` when
        any dataset binding or pipeline-spec node still references the
        slug — `{datasetBindings: N, pipelineReferences: M}` — clean
        those up first. The typical lifecycle is archive → operator
        decides nothing breaks → force-delete from the archived state.
      parameters:
        - $ref: "#/components/parameters/ForceQuery"
      responses:
        "204":
          description: >-
            Archived (default) or hard-deleted (`?force=true`).
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/HasDependents" }
  /api/connections/{id}/probe:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: >-
        One-shot health probe against the row's driver. The result is
        cached on the row (`lastProbedAt` / `lastProbeOk` /
        `lastProbeError`) and broadcast over the change WebSocket so
        the Connections grid badge updates live. The periodic
        `connection_probe_sweep` worker job runs the same logic every
        10 minutes.
      responses:
        "200":
          description: Probe result.
          content:
            application/json:
              schema:
                type: object
                required: [ok, probedAt]
                properties:
                  ok: { type: boolean }
                  error: { type: [string, "null"] }
                  probedAt: { type: string }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Dataset-binding overrides (per-tenant, per-env) ---
  /api/pipelines/{pipeline_id}/dataset-bindings:
    parameters:
      - $ref: "#/components/parameters/PipelineRef"
    get:
      summary: >-
        List override entries for a pipeline's dataset bindings.
        Returns one row per (tenant, env, bindingId) tuple that has an
        override. Without overrides, the pipeline-spec defaults stand.
      responses:
        "200":
          description: Override list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  overrides:
                    type: array
                    items: { $ref: "#/components/schemas/DatasetBindingOverride" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
    post:
      summary: >-
        Create a binding override that pins one of the pipeline's
        bindings to a specific dataset slug for a (tenant, env). Caller
        needs `pipeline:write` at the target scope.
      responses:
        "201":
          description: Override created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  override: { $ref: "#/components/schemas/DatasetBindingOverride" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/dataset-bindings/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      summary: Update an override's `datasetSlug` / `datasetAlias`.
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding: { $ref: "#/components/schemas/DatasetBindingOverride" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: Remove a binding override (reverts to the pipeline-spec default).
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/tenants/{id}/pipelines:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: >-
        Per associated pipeline: association `enabled` plus activations[]
        (each with effectiveVersionId resolved against
        pipeline.latestVersionId).
      responses:
        "200":
          description: Associated pipelines
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines:
                    type: array
                    items:
                      type: object
                      properties:
                        pipelineId: { type: string }
                        enabled: { type: boolean }
                        activations:
                          type: array
                          items: { $ref: "#/components/schemas/Activation" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Associate a pipeline with the tenant (tenant_pipelines enabled=true)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pipelineId]
              properties:
                pipelineId: { type: string }
                environment: { type: string, default: dev }
      responses:
        "201":
          description: "Association created (enabled true)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenantId: { type: string, format: uuid }
                  pipelineId: { type: string, format: uuid }
                  enabled: { type: boolean }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/tenants/{id}/pipelines/{pid}:
    patch:
      summary: Activate/deactivate a tenant<->pipeline association
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: pid
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
                environment: { type: string, default: dev }
      responses:
        "200":
          description: "Association updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenantId: { type: string, format: uuid }
                  pipelineId: { type: string, format: uuid }
                  enabled: { type: boolean }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/tenants/{id}/pipelines/{pid}/activations:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: pid
        in: path
        required: true
        description: >-
          A pipeline UUID OR its slug/name. Resolved as a UUID first, then
          by slug; the resolved real UUID is stored on the activation row.
        schema: { type: string }
    get:
      summary: List activations for a tenant+pipeline (pipeline by id or slug)
      responses:
        "200":
          description: Activation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  activations:
                    type: array
                    items: { $ref: "#/components/schemas/Activation" }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
    post:
      summary: >-
        Create an activation (pipeline by id or slug). Multiple concurrent
        activations per tenant+pipeline+environment are supported (e.g. one
        pinned + one track_latest). Duplicate (tenant,pipeline,env,label) => 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, environment]
              properties:
                label: { type: string }
                environment: { type: string }
                pipelineVersionId:
                  type: string
                  description: Required unless trackLatest is true.
                trackLatest: { type: boolean, default: false }
                enabled: { type: boolean, default: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  activation: { $ref: "#/components/schemas/Activation" }
        "400": { $ref: "#/components/responses/InvalidIdentifier" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/PipelineNotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/tenants/{id}/pipelines/{pid}/activations/{aid}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: pid
        in: path
        required: true
        schema: { type: string }
      - name: aid
        in: path
        required: true
        schema: { type: string }
    patch:
      summary: Update an activation (enabled / trackLatest / pipelineVersionId / label)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                trackLatest: { type: boolean }
                pipelineVersionId: { type: [string, "null"] }
                label: { type: string }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  activation: { $ref: "#/components/schemas/Activation" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: Delete an activation
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/schedules:
    get:
      summary: >-
        List schedules. Non platform_admin callers are tenant-scoped. Optional
        tenant / pipeline query filters.
      parameters:
        - name: tenant
          in: query
          schema: { type: string }
        - name: pipeline
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedules:
                    type: array
                    items: { $ref: "#/components/schemas/Schedule" }
    post:
      summary: >-
        Create a schedule. The cron is validated via parseCron (422 on
        CronParseError) and next_run_at is set to nextAfter(cron, now).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, pipelineId, environment, cron]
              properties:
                tenantId: { type: string }
                pipelineId: { type: string }
                environment: { type: string }
                activationLabel: { type: string }
                cron: { type: string }
                timezone: { type: string, default: UTC }
                input: { type: object }
                enabled: { type: boolean, default: true }
      responses:
        "201":
          description: Created (nextRunAt computed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule: { $ref: "#/components/schemas/Schedule" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/schedules/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      summary: >-
        Update a schedule. If cron changes it is re-validated (422 on bad
        cron) and next_run_at is recomputed.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                environment: { type: string }
                activationLabel: { type: [string, "null"] }
                cron: { type: string }
                timezone: { type: string }
                input: { type: object }
                enabled: { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule: { $ref: "#/components/schemas/Schedule" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    patch:
      summary: Enable / disable a schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule: { $ref: "#/components/schemas/Schedule" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: Delete a schedule
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/config/definitions:
    get:
      summary: List config definitions
      responses:
        "200":
          description: "Definition list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  definitions: { type: array, items: { $ref: "#/components/schemas/ConfigDefinition" } }
  /api/config/definitions/{key}:
    put:
      summary: Upsert a config definition
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  definition: { $ref: "#/components/schemas/ConfigDefinition" }
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                type: object
                properties:
                  definition: { $ref: "#/components/schemas/ConfigDefinition" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: Delete a config definition
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/config/values:
    get:
      summary: >-
        List config values (sensitive values defensively redacted). Filter by
        scope + scopeId so the web can build a global -> tenant -> pipeline
        config/secret tree. scope_id and scopeId are accepted interchangeably.
      parameters:
        - name: key
          in: query
          schema: { type: string }
        - name: scope
          in: query
          schema:
            type: string
            enum: [global, environment, tenant, tenant_pipeline, pipeline, runtime]
        - name: scope_id
          in: query
          schema: { type: string }
        - name: scopeId
          in: query
          description: camelCase alias of scope_id.
          schema: { type: string }
      responses:
        "200":
          description: "Config value list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  values: { type: array, items: { $ref: "#/components/schemas/ConfigValue" } }
    post:
      summary: >-
        Upsert a config value. The required permission is chosen from the scope
        (config:edit_global / config:edit_tenant / config:edit_pipeline).
      responses:
        "201":
          description: "Upserted (value redacted in response)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  value: { $ref: "#/components/schemas/ConfigValue" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/config/values/{id}:
    delete:
      summary: Delete a config value
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/config/resolved:
    get:
      summary: >-
        Resolve effective configuration for a pipeline/tenant/environment with
        secret redaction. Non-platform-admin callers may only resolve their own
        tenant.
      parameters:
        - name: pipeline_id
          in: query
          required: true
          schema: { type: string }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: environment
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "ResolvedConfig with explanations + violations"
          content:
            application/json:
              schema:
                type: object
                properties:
                  values: { type: object, additionalProperties: true }
                  explanations: { type: object, additionalProperties: true }
                  violations: { type: array, items: { type: object, additionalProperties: true } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /api/secrets:
    get:
      summary: List secret metadata only (value always REDACTED)
      responses:
        "200":
          description: "Redacted secret metadata"
          content:
            application/json:
              schema:
                type: object
                properties:
                  secrets: { type: array, items: { $ref: "#/components/schemas/SecretMetadata" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a secret via DatabaseEncryptedSecretProvider
      responses:
        "201":
          description: "Created (value REDACTED"
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { $ref: "#/components/schemas/SecretMetadata" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/secrets/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      summary: Rotate a secret (returns new version, value REDACTED)
      responses:
        "200":
          description: "Rotated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { $ref: "#/components/schemas/SecretMetadata" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: Delete a secret (body must carry key/scope to identify the ref)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /api/executions:
    get:
      summary: List executions (tenant-scoped for non platform_admin)
      responses:
        "200":
          description: "Execution list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions: { type: array, items: { $ref: "#/components/schemas/Execution" } }
  /api/executions/{execution_id}:
    get:
      summary: Get an execution
      parameters:
        - name: execution_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "Execution record"
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution: { $ref: "#/components/schemas/Execution" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/executions/{execution_id}/trace:
    get:
      summary: Get execution trace (execution + node records)
      parameters:
        - name: execution_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "Trace events"
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution: { $ref: "#/components/schemas/Execution" }
                  nodes: { type: array, items: { $ref: "#/components/schemas/ExecutionNode" } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Tenant environments (per-tenant scoping for config / deployments / connections) ---
  /api/tenants/{id}/environments:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: List environments declared on a tenant. Default seeds include `dev`, `staging`, `prod`.
      responses:
        "200":
          description: Environment list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  environments:
                    type: array
                    items: { $ref: "#/components/schemas/Environment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      summary: >-
        Add an environment to a tenant. Caller needs `config:edit_tenant`
        for the tenant. Environment names are unique per tenant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: [string, "null"] }
      responses:
        "201":
          description: Environment created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  environment: { $ref: "#/components/schemas/Environment" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/tenants/{id}/environments/{envId}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: envId
        in: path
        required: true
        schema: { type: string }
    put:
      summary: >-
        Update an environment's name / description / production flag
        (config:edit_global). Only the provided fields change.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: [string, "null"] }
                isProduction: { type: boolean }
      responses:
        "200":
          description: The updated environment.
          content:
            application/json:
              schema:
                type: object
                properties:
                  environment: { type: object }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: >-
        Remove an environment. Refuses when active deployments still
        target it (operator must redeploy or archive those first).
      responses:
        "204": { description: Removed }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Active deployments still reference this environment. }

  # --- Tenant storage (git-backed tenant config) ---
  /api/tenants/{id}/storage:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: >-
        Fetch the tenant's git storage config (URL, branch, secret
        reference, sync status). The wrapped data-encryption key is
        never returned. See `docs/admin/git-backed-tenants.md`.
      responses:
        "200":
          description: Storage config (or `null` when unset).
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: [object, "null"]
                    properties:
                      repoUrl: { type: string }
                      branch: { type: string }
                      lastSyncedAt: { type: [string, "null"] }
                      lastSyncError: { type: [string, "null"] }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: >-
        Connect or update the tenant's git storage (config:edit_tenant).
        Mints a data-encryption key on first config, reuses it on edits.
        The `authSecretId` references a managed secret; no raw credential
        is stored on this row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [remoteUrl, branch, pathPrefix, authMethod, authSecretId]
              properties:
                remoteUrl: { type: string }
                branch: { type: string }
                pathPrefix: { type: string }
                authMethod: { type: string, enum: [https, ssh] }
                authSecretId: { type: string }
      responses:
        "200":
          description: The stored git config (wrapped DEK never returned).
          content:
            application/json:
              schema:
                type: object
                properties:
                  config: { type: object }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    delete:
      summary: Disconnect the tenant from its git storage. Local cache stays.
      responses:
        "204": { description: Disconnected }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/tenants/{id}/storage/sync:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: >-
        Trigger an on-demand pull from the tenant's configured git
        storage. The periodic sweep runs every 5 minutes; this is the
        manual fire-it-now button.
      responses:
        "202":
          description: Sync enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  syncedAt: { type: string }
                  pulled: { type: integer, description: "Number of objects materialised this run." }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Retention (platform-wide janitor policies) ---
  /api/retention:
    get:
      summary: >-
        List per-resource retention policies. Caller needs
        `config:edit_global`. The worker runs a nightly janitor sweep
        that deletes rows older than the configured age.
      responses:
        "200":
          description: Retention settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: array
                    items: { $ref: "#/components/schemas/RetentionSetting" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/retention/{resource}:
    parameters:
      - name: resource
        in: path
        required: true
        schema:
          type: string
          enum: [executions, usage, audit]
    patch:
      summary: Update the retention window for one resource. `null` disables expiry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [retentionDays]
              properties:
                retentionDays: { type: [integer, "null"], minimum: 1 }
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  setting: { $ref: "#/components/schemas/RetentionSetting" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /api/audit:
    get:
      summary: List audit logs (tenant-scoped for non platform_admin)
      parameters:
        - name: tenant_id
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: "Audit log list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs: { type: array, items: { $ref: "#/components/schemas/AuditLog" } }
                  nextCursor: { type: [string, "null"] }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/usage:
    get:
      summary: Usage and cost summary (aggregated + raw records)
      parameters:
        - name: tenant_id
          in: query
          schema: { type: string }
        - name: execution_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: "Usage summary"
          content:
            application/json:
              schema:
                type: object
                properties:
                  records: { type: array, items: { $ref: "#/components/schemas/UsageRecord" } }
                  totals: { type: object, additionalProperties: true }
  /api/plugins:
    get:
      summary: List plugins from the loaded plugin registry
      description: >-
        Returns each plugin's manifest projection, including configSchema,
        secretsSchema, and ui metadata so the UI can render schema-driven forms.
      responses:
        "200":
          description: Plugin list
          content:
            application/json:
              schema:
                type: object
                properties:
                  plugins:
                    type: array
                    items: { $ref: "#/components/schemas/Plugin" }
  /api/plugins/{category}/{id}/{version}:
    get:
      summary: Get a single plugin's manifest projection
      parameters:
        - name: category
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Plugin manifest projection
          content:
            application/json:
              schema:
                type: object
                properties:
                  plugin: { $ref: "#/components/schemas/Plugin" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/plugins/{id}/docs:
    parameters:
      - name: id
        in: path
        required: true
        description: Plugin id (the manifest's `id` — e.g. `transform`, `dataset_search`).
        schema: { type: string }
    get:
      summary: >-
        Long-form markdown reference for a plugin (the file under
        `docs/plugins/<id>.md`). Surfaced by the Builder's node
        inspector and the in-app help dialog (ADR-0013).
      responses:
        "200":
          description: Plugin documentation.
          content:
            application/json:
              schema:
                type: object
                required: [id, markdown]
                properties:
                  id: { type: string }
                  markdown: { type: string }
        "404":
          description: Plugin exists but no docs file is shipped for it.
  /api/plugins/sources:
    get:
      summary: List plugin sources (built-in + DB-backed git rows)
      description: >-
        PLUGIN-ARCH-1 (ADR-0034). Built-in sources (`builtin` /
        `sample-text`) always surface — they're the safety-net rows
        that load even before the first refresh. External git sources
        come from the `plugin_sources` table. Each row's `status` /
        `pluginCount` / `error` reflect the holder's most recent
        refresh.
      responses:
        "200":
          description: Source catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items: { $ref: "#/components/schemas/PluginSource" }
        "503":
          description: Holder / source store not wired (legacy harness).
    post:
      summary: Create a new external (git) plugin source (plugin:manage)
      description: >-
        Reserved ids (`builtin`, `sample-text`) are refused.
        `gitUrl` supports https / ssh / file:// transports. When
        `requireSignature` is true, populate `allowedSigners` (an
        SSH allowed-signers file content) — the lifecycle's verify
        stage runs `git verify-commit` against it before load.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PluginSourceUpsert" }
      responses:
        "200":
          description: Created source.
          content:
            application/json:
              schema:
                type: object
                properties:
                  source: { $ref: "#/components/schemas/PluginSource" }
        "400": { description: Invalid / reserved id, or missing gitUrl }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/plugins/sources/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      summary: Update an external plugin source (plugin:manage)
      description: >-
        Minimal-UPDATE shape — only the fields the caller sends are
        modified; unmentioned fields preserved. Reserved ids
        (`builtin`, `sample-text`) refused.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PluginSourceUpsert" }
      responses:
        "200":
          description: Updated source.
          content:
            application/json:
              schema:
                type: object
                properties:
                  source: { $ref: "#/components/schemas/PluginSource" }
        "400": { description: Reserved id }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Remove an external plugin source (plugin:manage)
      description: >-
        The source's plugins disappear on the next refresh. Reserved
        ids (`builtin`, `sample-text`) refused — they're safety-net
        rows.
      responses:
        "200":
          description: "Deleted"
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        "400": { description: Reserved id }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/plugins/refresh:
    post:
      summary: Rebuild the plugin registry from the sources + atomic swap (plugin:manage)
      description: >-
        Walks every enabled source through the lifecycle (resolve →
        clone → verify → install → import → scan → register), builds
        a fresh `PluginRegistry`, and atomically swaps the holder's
        pointer. In-flight executions keep the snapshot they already
        resolved; new requests see the post-swap registry. Returns
        the per-source status + the diff (added / removed / updated
        plugin keys) so the admin sees exactly what changed.
      responses:
        "200":
          description: Refresh report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PluginRefreshReport" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503":
          description: Holder / source store not wired (legacy harness).
  /api/providers:
    get:
      summary: List providers from the loaded provider registry
      responses:
        "200":
          description: "Provider list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers: { type: array, items: { $ref: "#/components/schemas/Provider" } }
  /api/providers/{id}/models:
    get:
      summary: List a provider's model catalog
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: "Model catalog"
          content:
            application/json:
              schema:
                type: object
                properties:
                  models: { type: array, items: { type: object, additionalProperties: true } }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Personal API keys (ADR-0017) ---
  /api/api-keys:
    get:
      summary: >-
        List API keys for the signed-in user (never their plaintext).
        Only user principals can manage their own keys.
      responses:
        "200":
          description: Caller's API keys.
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKeys:
                    type: array
                    items: { $ref: "#/components/schemas/ApiKey" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: >-
        Mint a new API key for the signed-in user. The plaintext
        `rgd_<prefix>_<secret>` is returned exactly once in this
        response; subsequent reads expose only the prefix.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, description: "Operator-facing display name." }
                scope:
                  type: [string, "null"]
                  description: Optional tenant scope (`t/<uuid>`).
      responses:
        "201":
          description: API key minted. `plaintext` is shown only here.
          content:
            application/json:
              schema:
                type: object
                required: [apiKey, plaintext]
                properties:
                  apiKey: { $ref: "#/components/schemas/ApiKey" }
                  plaintext: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/api-keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    delete:
      summary: Revoke an API key. Idempotent — revoking an already-revoked key is a 204.
      responses:
        "204": { description: Revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/auth/login:
    post:
      summary: Local password login (public). Returns a session token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: "{ token, user }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: "#/components/schemas/User" }
        "401": { description: Invalid credentials }
        "403": { description: Account disabled }
  /api/auth/signup:
    post:
      summary: >-
        Self-service signup (public). Allowed only when the configured signup
        mode is open_*; admin_only returns 403 signup_disabled.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
                displayName: { type: string }
      responses:
        "201":
          description: "{ token, user }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: "#/components/schemas/User" }
        "403": { description: Signup disabled }
        "409": { description: Email already in use }
        "422": { description: Weak password }
  /api/auth/logout:
    post:
      summary: Logout (stateless; the client discards the token).
      responses:
        "204": { description: No content }
  /api/auth/me:
    get:
      summary: Current principal, linked user, scoped grants, and effective permissions.
      responses:
        "200":
          description: "{ principal, user, grants, permissions }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  principal: { $ref: "#/components/schemas/Principal" }
                  user: { $ref: "#/components/schemas/User" }
                  grants: { type: array, items: { $ref: "#/components/schemas/Grant" } }
                  permissions: { type: array, items: { type: string } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      summary: >-
        Self-service profile edit for the signed-in user. Any user can
        edit their OWN display name / preferences without a grant
        (the principal IS the resource). API-key principals are refused.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
                preferences: { type: object }
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "API-key principals have no editable profile" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/auth/password:
    post:
      summary: >-
        Change the signed-in user's local password. Caller proves
        knowledge of the current password before the new hash is
        written.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string }
      responses:
        "204": { description: Password updated }
        "401": { description: Current password incorrect }
        "422": { description: New password fails strength policy }
  /api/auth/providers:
    get:
      summary: Enabled SSO providers for the login page (public).
      security: []
      responses:
        "200":
          description: "{ providers: [{ slug, kind, displayName }] }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers: { type: array, items: { type: object, properties: { slug: { type: string }, kind: { type: string }, displayName: { type: string } } } }
  /api/auth/sso/{slug}/start:
    get:
      summary: Begin SSO (302 to the IdP). Public.
      security: []
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "302": { description: Redirect to the identity provider }
        "404": { description: Provider not found or disabled }
  /api/auth/sso/{slug}/callback:
    get:
      summary: OIDC redirect callback (public). 302s back to the web app with the token.
      security: []
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: code, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
      responses:
        "302": { description: "Redirect to WEB_BASE_URL with #access_token" }
        "401": { description: SSO validation failed }
    post:
      summary: SAML ACS callback (public, form POST of SAMLResponse/RelayState).
      security: []
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "302": { description: "Redirect to WEB_BASE_URL with #access_token" }
        "401": { description: SSO validation failed }
  /api/auth/settings:
    get:
      summary: Read instance auth settings (permission auth:settings).
      responses:
        "200":
          description: "{ settings: { signupMode, defaultRole } }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings: { $ref: "#/components/schemas/AuthSettings" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      summary: Update signup mode / default role (permission auth:settings).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signupMode]
              properties:
                signupMode:
                  type: string
                  enum: [admin_only, open_default_role, open_no_access]
                defaultRole: { type: string, nullable: true }
      responses:
        "200":
          description: "Updated settings"
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings: { $ref: "#/components/schemas/AuthSettings" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/users:
    get:
      summary: List users (permission user:manage).
      responses:
        "200":
          description: "{ users }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  users: { type: array, items: { $ref: "#/components/schemas/User" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Provision a user (permission user:manage). Omit password for SSO-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
                password: { type: string }
                displayName: { type: string }
                status: { type: string, enum: [active, disabled] }
      responses:
        "201":
          description: "Created user"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Email exists }
  /api/users/{id}:
    patch:
      summary: Update displayName / status / password (permission user:manage).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: "Updated user"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Delete a user and its grants (permission user:manage).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/users/{id}/grants:
    get:
      summary: List a user's scoped role grants (permission user:manage).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: "{ grants }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  grants: { type: array, items: { $ref: "#/components/schemas/Grant" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: >-
        Grant a role at a scope. The caller must hold user:manage over the
        TARGET scope, so a tenant admin cannot mint platform-wide grants.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string }
                scope:
                  type: string
                  description: "Explicit scope string; or use the parts below."
                tenantId: { type: string }
                environment: { type: string }
                pipelineId: { type: string }
      responses:
        "201":
          description: "Created grant"
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant: { $ref: "#/components/schemas/Grant" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/users/{id}/grants/{grantId}:
    delete:
      summary: Revoke a grant (requires user:manage over that grant's scope).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: grantId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/roles:
    get:
      summary: Roles, their permissions, and the full permission catalog (role:manage).
      responses:
        "200":
          description: "{ roles, allPermissions }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles: { type: array, items: { $ref: "#/components/schemas/Role" } }
                  allPermissions: { type: array, items: { type: string } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a custom role (permission role:manage).
      responses:
        "201":
          description: "Created role"
          content:
            application/json:
              schema:
                type: object
                properties:
                  role: { $ref: "#/components/schemas/Role" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/roles/{name}/permissions:
    put:
      summary: Replace a role's permission set (role:manage). Effective immediately.
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permissions]
              properties:
                permissions: { type: array, items: { type: string } }
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  role: { $ref: "#/components/schemas/Role" }
                  permissions: { type: array, items: { type: string } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/roles/{name}:
    delete:
      summary: >-
        Delete a custom role (`role:manage`). Built-in roles always
        refuse. Default: refuses with 409 `has_dependents` when grants
        hold the role (rbac_grants.role is text with no FK, so dangling
        grants would silently break future permission checks).
        `?force=true` drops the held grants first, then deletes the role
        catalog row.
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/ForceQuery"
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Role not found }
        "409":
          description: >-
            Either a built-in role (cannot be deleted) OR a custom role
            that still has grants and `?force=true` was not supplied
            (`has_dependents` envelope).
  /api/identity-providers:
    get:
      summary: List SSO connections; secrets redacted (permission idp:manage).
      responses:
        "200":
          description: "{ providers }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers: { type: array, items: { $ref: "#/components/schemas/IdentityProvider" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create an OIDC/SAML connection (permission idp:manage).
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider: { $ref: "#/components/schemas/IdentityProvider" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Slug exists }
  /api/identity-providers/{id}:
    put:
      summary: Update a connection; REDACTED secret fields are preserved (idp:manage).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider: { $ref: "#/components/schemas/IdentityProvider" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      summary: Delete a connection (permission idp:manage).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/event-subscriptions:
    get:
      summary: >-
        List the caller tenant's platform-event webhook subscriptions;
        signing secret redacted (permission config:edit_tenant). ADR 0036.
      responses:
        "200":
          description: "{ subscriptions }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions: { type: array, items: { $ref: "#/components/schemas/EventSubscription" } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "501": { description: Subscriptions not configured (no repository) }
    post:
      summary: >-
        Create a webhook subscription. A subscription with `pre` in its
        phases is a SYNCHRONOUS gate that can veto the matching operation
        (respond 200 {allow:false}); `post` phases are durable observers
        delivered from the event stream, HMAC-signed (config:edit_tenant).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events, url]
              properties:
                events:
                  type: array
                  items: { type: string }
                  description: 'event-name globs, e.g. "secret.*", "execution.failure", "*"'
                phases:
                  type: array
                  items: { type: string, enum: [pre, post] }
                  default: [post]
                url: { type: string, format: uri }
                secret: { type: string, description: HMAC-SHA256 signing key (write-only) }
                description: { type: string }
                active: { type: boolean, default: true }
      responses:
        "201":
          description: "{ subscription }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription: { $ref: "#/components/schemas/EventSubscription" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { description: "events (non-empty string[]) + http(s) url required" }
        "501": { description: Subscriptions not configured }
  /api/event-subscriptions/{id}:
    delete:
      summary: Delete a webhook subscription (config:edit_tenant; own tenant only).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/event-subscriptions/failures:
    get:
      summary: >-
        List dead-lettered webhook deliveries (deliveries that exhausted
        their retries), for inspection + replay (config:edit_tenant).
      responses:
        "200":
          description: "{ failures }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  failures: { type: array, items: { $ref: "#/components/schemas/WebhookDeliveryFailure" } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "501": { description: DLQ not configured }
  /api/event-subscriptions/failures/{id}/replay:
    post:
      summary: >-
        Re-deliver a dead-lettered webhook (via the live subscription's
        url+secret, else the captured url); marks it replayed on success
        (config:edit_tenant).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: "{ replayed: true }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  replayed: { type: boolean }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { description: Replay delivery failed }
  /api/pipelines/{id}/triggers:
    get:
      summary: List webhook triggers for a pipeline (pipeline:run @ scope).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: "{ triggers }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  triggers: { type: array, items: { $ref: "#/components/schemas/PipelineTrigger" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: >-
        Mint a public webhook trigger for the pipeline. Returns the bound
        trigger metadata + plaintext token (shown ONCE) + the full URL.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [environment, name]
              properties:
                environment: { type: string }
                name: { type: string, description: operator-facing label }
                activationLabel: { type: string }
                enabled: { type: boolean, default: true }
      responses:
        "201":
          description: "{ trigger, token, url }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  trigger: { $ref: "#/components/schemas/PipelineTrigger" }
                  token: { type: string, description: "Full token — returned ONCE, at creation." }
                  url: { type: string, format: uri }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/triggers/{id}:
    delete:
      summary: Revoke a webhook trigger (pipeline:run @ that trigger's scope).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/triggers/webhook/{token}:
    post:
      summary: >-
        Public webhook trigger: anyone holding the path token can POST to
        start a run. Body becomes the run's `input`.
      security: []
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "202":
          description: "{ executionId, pipelineId, version, status }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  executionId: { type: string }
                  pipelineId: { type: string, format: uuid }
                  version: { type: string }
                  status: { type: string }
        "401": { description: Invalid / revoked / disabled token }
        "404": { $ref: "#/components/responses/NotFound" }
  /mcp:
    post:
      summary: >-
        MCP (Model Context Protocol) endpoint — Streamable HTTP transport. An
        LLM client connects and discovers tools/resources that mirror the
        REST API surface; tool calls re-enter the same RBAC path as direct
        HTTP. Stateless (one server + transport per request).
      responses:
        "200":
          description: "MCP response (JSON-RPC / SSE-style)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc: { type: string }
                  id: {}
                  result: { type: object, additionalProperties: true }
                  error: { type: object, additionalProperties: true }
