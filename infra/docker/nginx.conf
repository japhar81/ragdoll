server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy control-plane endpoints to the api service so the SPA can
    # call relative /api, /healthz, /readyz paths with no CORS.
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # RAG runs on CPU Ollama can be slow on first call.
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    location = /healthz {
        proxy_pass http://api:3001/healthz;
        proxy_set_header Host $host;
    }

    location = /readyz {
        proxy_pass http://api:3001/readyz;
        proxy_set_header Host $host;
    }

    # SPA fallback: any unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
