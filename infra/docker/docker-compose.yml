# One-command local RAGdoll stack:
#
#   docker compose -f infra/docker/docker-compose.yml up --build
#
# Brings up Postgres, Redis, Qdrant, Ollama (CPU), the OTEL collector, runs
# migrations + seeds once (db-init), pulls the CPU models once (ollama-pull),
# then starts the API, worker, and nginx-served web UI.
#
# NOTE: the first `up` downloads the qwen2.5:0.5b + nomic-embed-text models
# and CPU inference is slow — the first /run can take tens of seconds.

name: ragdoll

services:
  postgres:
    # pgvector/pgvector image is the official Postgres + pgvector build.
    # pg16 tag matches the previous bare-postgres pg version so the
    # data volume is upgrade-compatible. Required by Phase 6's
    # PgVectorStore — see packages/db/migrations/011_pgvector.sql.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ragdoll
      POSTGRES_PASSWORD: ragdoll
      POSTGRES_DB: ragdoll
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragdoll"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Prometheus exporter for Postgres. Scraped by the bundled OTel collector
  # at postgres-exporter:9187; surfaces pg_stat_database / pg_locks / etc.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://ragdoll:ragdoll@postgres:5432/ragdoll?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Prometheus exporter for Redis. Scraped at redis-exporter:9121; surfaces
  # redis_ops_per_sec / redis_memory_used_bytes / redis_connected_clients.
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  # Dgraph standalone (zero + alpha in one container) for the graph
  # modality — used by the dgraph_upsert / dgraph_query plugins.
  # The standalone image is intentionally dev-only; production
  # deployments split zero / alpha across nodes for HA.
  # HTTP API on :8080 (mutate / query / alter); gRPC on :9080.
  dgraph:
    image: dgraph/standalone:v23.1.0
    ports:
      - "8081:8080"
      - "9081:9080"
    volumes:
      - dgraph-data:/dgraph
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Single-node OpenSearch for the opensearch_* plugins (BM25 / kNN / hybrid
  # retrievers + input/output). Security plugin disabled for local dev so the
  # client can talk plain HTTP with no credentials.
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # Local dev: don't block writes when the host's Docker disk is
      # tight. With the default 85% high watermark a half-full laptop
      # silently flips every index to read-only-allow-delete and the
      # codebase-ingest-docs demo crashes at the OpenSearch write step
      # with HTTP 403 / index_create_block_exception.
      cluster.routing.allocation.disk.threshold_enabled: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://127.0.0.1:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  # One-shot: wait for Ollama, then pull the CPU models the demo needs.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo "waiting for ollama..." &&
        until ollama list >/dev/null 2>&1; do sleep 2; done &&
        ollama pull qwen2.5:0.5b &&
        ollama pull nomic-embed-text &&
        echo "models pulled"
    restart: "no"

  # Grafana LGTM all-in-one (Loki + Grafana + Tempo + Mimir + OTel Collector).
  # The bundled collector listens on the same OTLP ports (4317/4318) as the
  # previous standalone otel-collector, so the api/worker env vars don't
  # change. We keep the service NAME `otel-collector` for the same reason —
  # `OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318` keeps working.
  #
  # Auto-provisioned Grafana datasources (Loki/Tempo/Prom) and the RAGdoll
  # overview dashboard live in ../grafana/* and are mounted read-only.
  # Grafana UI is on host port 3300 (3000 is too commonly used).
  otel-collector:
    image: grafana/otel-lgtm:0.11.10
    environment:
      # Default Grafana admin login (only matters if you turn auth back on —
      # local dev runs with anonymous viewer access via the provisioning files).
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Skip the bundled welcome dashboards; we ship our own.
      ENABLE_LOGS_GRAFANA: "true"
      ENABLE_LOGS_OTELCOL: "true"
    # The bundled collector reads `docker_stats` from the host socket and
    # tails every container's JSON log file via the `filelog` receiver. Both
    # need to run as root inside the container, which is the default for
    # this image — no `user:` override needed.
    user: root
    ports:
      - "3300:3000"   # Grafana UI -> http://localhost:3300
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - lgtm-data:/data
      - ../grafana/provisioning:/otel-lgtm/grafana/conf/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
      # Override the bundled OTel Collector config so we ingest container
      # logs (filelog), container resource metrics (docker_stats), and
      # the postgres / redis exporters (prometheus scrape). See
      # infra/otel/otelcol-config.yaml for the full pipeline definition.
      - ../otel/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # The collector's `container` filelog operator only recognizes the
      # canonical /var/lib/docker/containers path layout — mount at the
      # SAME path inside the container so it can derive container_id /
      # container_name without a regex shim.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    healthcheck:
      # Grafana's /api/health returns {"database":"ok"} once everything inside
      # the LGTM container is up — the collector starts well before this. The
      # image doesn't ship wget / curl, so probe with `bash /dev/tcp/...` which
      # is always available in the bundled bash.
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/127.0.0.1/3000' >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Python-only crawler plugins (crawl4ai + scrapy) over HTTP. Internal
  # service — the api/worker reach it via the compose network at
  # http://python-plugins:8000. The image bundles a headless Chromium so it
  # is large/slow to build; it is deliberately NOT in scripts/dev-refresh.sh
  # (rebuild explicitly with `docker compose up -d --build python-plugins`
  # or `make crawl-up`).
  python-plugins:
    build:
      context: ../..
      dockerfile: services/python-plugins/Dockerfile
    environment:
      PORT: "8000"
    # Optional debugging only; the service is reachable in-network without
    # publishing. Uncomment to hit it from the host.
    # ports:
    #   - "8000:8000"
    healthcheck:
      # python:slim has no curl in the base, but the Dockerfile installs it;
      # use a stdlib urllib check so the probe works regardless.
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else sys.exit(1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # One-shot: run migrations + seeds, then exit. Reuses the api image.
  db-init:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    command:
      ["node", "--experimental-strip-types", "scripts/db-init.ts"]
    environment:
      DATABASE_URL: postgres://ragdoll:ragdoll@postgres:5432/ragdoll
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      PORT: "3001"
      RAGDOLL_ENV: development
      DATABASE_URL: postgres://ragdoll:ragdoll@postgres:5432/ragdoll
      REDIS_URL: redis://redis:6379
      SECRET_ENCRYPTION_KEY: local-dev-only-change-me-32-bytes-min
      SESSION_SECRET: local-dev-only-change-me-session-hmac
      # Auth is strict default-deny (no x-roles header trust). The first boot
      # provisions this platform admin so you can sign in at the login page.
      # Change these for any non-local deployment.
      BOOTSTRAP_ADMIN_EMAIL: admin@ragdoll.local
      BOOTSTRAP_ADMIN_PASSWORD: ragdoll-admin
      # Where the SSO callback sends the browser back with its session token.
      WEB_BASE_URL: "http://localhost:8088"
      # NOTE: the historical RAGDOLL_DEV_AUTH header-trusting fallback was
      # removed in Phase 12. Sign in as the bootstrap admin above and mint
      # an API key from Profile → API keys for non-interactive clients.
      QDRANT_URL: http://qdrant:6333
      OPENSEARCH_URL: http://opensearch:9200
      DGRAPH_URL: http://dgraph:8080
      # Phase 6: which vector backend createVectorStore picks when a
      # plugin hasn't been pointed at a specific Dataset. Default
      # `qdrant` keeps every existing pipeline working unchanged; flip
      # to `pgvector` to run Postgres-only (Qdrant container becomes
      # optional). Per-Dataset backend selection lands in a follow-up
      # via dataset.backends.vector.provider.
      RAGDOLL_VECTOR_BACKEND: ${RAGDOLL_VECTOR_BACKEND:-qdrant}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ragdoll-api
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ragdoll,deployment.environment=local"
      # Setting this makes the plugin-loader auto-register the external
      # crawl4ai_crawler / scrapy_spider plugins so they appear in the
      # builder palette. api only lists/validates them — it does not need
      # the (slow) python-plugins build to be healthy to start.
      PYTHON_PLUGIN_URL: http://python-plugins:8000
      PYTHON_PLUGIN_TIMEOUT_MS: "300000"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      python-plugins:
        condition: service_started
      opensearch:
        condition: service_started
    healthcheck:
      # 127.0.0.1 (not localhost): inside the container `localhost` resolves to
      # IPv6 ::1 first, where the IPv4-bound server does not listen, so the
      # check would never pass and the API would stay `unhealthy`.
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Two worker replicas to prove BullMQ scale-out. Both consume from the
  # same Redis queue; BullMQ distributes jobs across them so a Run-All
  # of N pipelines lands roughly N/2 on each worker, capped by
  # WORKER_CONCURRENCY. The Grafana "Worker scale-out" dashboard shows
  # the split live. The two services share everything except WORKER_ID,
  # OTEL service.instance.id, and depends_on (worker-2 doesn't block
  # behind file-watcher's startup since file-watcher needs only one
  # API/worker pair).
  worker-1:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      WORKER_ID: worker-1
      DATABASE_URL: postgres://ragdoll:ragdoll@postgres:5432/ragdoll
      REDIS_URL: redis://redis:6379
      SECRET_ENCRYPTION_KEY: local-dev-only-change-me-32-bytes-min
      QDRANT_URL: http://qdrant:6333
      OPENSEARCH_URL: http://opensearch:9200
      DGRAPH_URL: http://dgraph:8080
      RAGDOLL_VECTOR_BACKEND: ${RAGDOLL_VECTOR_BACKEND:-qdrant}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_WARM_MODELS: ${OLLAMA_WARM_MODELS:-qwen2.5:0.5b,nomic-embed-text}
      OLLAMA_WARM_INTERVAL_MS: ${OLLAMA_WARM_INTERVAL_MS:-300000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ragdoll-worker
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ragdoll,deployment.environment=local,service.instance.id=worker-1"
      PYTHON_PLUGIN_URL: http://python-plugins:8000
      PYTHON_PLUGIN_TIMEOUT_MS: "300000"
    volumes:
      - "${CODEBASE_PATH:-../..}:/workspace:ro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      api:
        condition: service_started
      python-plugins:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  worker-2:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      WORKER_ID: worker-2
      DATABASE_URL: postgres://ragdoll:ragdoll@postgres:5432/ragdoll
      REDIS_URL: redis://redis:6379
      SECRET_ENCRYPTION_KEY: local-dev-only-change-me-32-bytes-min
      QDRANT_URL: http://qdrant:6333
      OPENSEARCH_URL: http://opensearch:9200
      DGRAPH_URL: http://dgraph:8080
      RAGDOLL_VECTOR_BACKEND: ${RAGDOLL_VECTOR_BACKEND:-qdrant}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_WARM_MODELS: ${OLLAMA_WARM_MODELS:-qwen2.5:0.5b,nomic-embed-text}
      OLLAMA_WARM_INTERVAL_MS: ${OLLAMA_WARM_INTERVAL_MS:-300000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ragdoll-worker
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ragdoll,deployment.environment=local,service.instance.id=worker-2"
      PYTHON_PLUGIN_URL: http://python-plugins:8000
      PYTHON_PLUGIN_TIMEOUT_MS: "300000"
    volumes:
      - "${CODEBASE_PATH:-../..}:/workspace:ro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      api:
        condition: service_started
      python-plugins:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  # File-watcher sidecar: watches the same /workspace mount and POSTs to a
  # RAGdoll webhook trigger URL on changes so a pipeline re-runs incrementally.
  # FILE_WATCHER_WEBHOOK_URL is unset by default; the service warns and exits
  # the loop until it's set (the watch keeps running, no Redis cost). Add the
  # URL to .env once you've created the webhook trigger for your pipeline.
  file-watcher:
    build:
      context: ../..
      dockerfile: infra/docker/file-watcher.Dockerfile
    environment:
      WATCH_PATH: /workspace
      FILE_WATCHER_WEBHOOK_URL: "${FILE_WATCHER_WEBHOOK_URL:-}"
      FILE_WATCHER_DEBOUNCE_MS: "${FILE_WATCHER_DEBOUNCE_MS:-5000}"
      FILE_WATCHER_IGNORE: "${FILE_WATCHER_IGNORE:-node_modules,.git,dist,build,.next,.cache}"
    volumes:
      - "${CODEBASE_PATH:-../..}:/workspace:ro"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "8088:80"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  qdrant-data:
  opensearch-data:
  dgraph-data:
  ollama-data:
  lgtm-data:
