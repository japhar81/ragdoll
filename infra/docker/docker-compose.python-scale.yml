# Opt-in overlay: run a SECOND free-standing python-plugins sidecar and fan
# plugin-source reloads out to BOTH (issues-log #8). Demonstrates that the
# docker topology "handles running more than one" sidecar — RAGdoll's loader
# parses PYTHON_PLUGIN_URL as a comma-separated list and POSTs /admin/reload
# to every target, so all instances stay in sync and any can serve a call.
#
# In k8s the equivalent is pythonPlugins.mode: sidecar (a per-pod sidecar
# container); compose has no pod, so we scale by adding named services and
# listing them all.
#
# Usage (layer it on top of the base compose):
#   docker compose -f infra/docker/docker-compose.yml \
#                  -f infra/docker/docker-compose.python-scale.yml up --build
#
# Or set COMPOSE_FILE for the dev scripts:
#   COMPOSE_FILE="infra/docker/docker-compose.yml:infra/docker/docker-compose.python-scale.yml" make up

services:
  # A second, independent sidecar. Same image/build + healthcheck as the
  # base `python-plugins`; different host port so both can publish.
  python-plugins-2:
    build:
      context: ../..
      dockerfile: services/python-plugins/Dockerfile
    environment:
      PORT: "8000"
      RAGDOLL_SIDECAR_ADMIN_TOKEN: ${RAGDOLL_SIDECAR_ADMIN_TOKEN:-}
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else sys.exit(1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # Point every compute service at BOTH sidecars. A reload now fans out to
  # python-plugins AND python-plugins-2; execution uses the first reachable
  # (they're identical after a reload). depends_on keeps the second sidecar
  # healthy before boot so the startup push reaches it (no stale replica).
  api:
    environment:
      PYTHON_PLUGIN_URL: "http://python-plugins:8000,http://python-plugins-2:8000"
    depends_on:
      python-plugins-2:
        condition: service_healthy

  worker-1:
    environment:
      PYTHON_PLUGIN_URL: "http://python-plugins:8000,http://python-plugins-2:8000"
    depends_on:
      python-plugins-2:
        condition: service_healthy

  worker-2:
    environment:
      PYTHON_PLUGIN_URL: "http://python-plugins:8000,http://python-plugins-2:8000"
    depends_on:
      python-plugins-2:
        condition: service_healthy
