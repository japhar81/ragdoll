# ============================================================================
# RAGdoll Helm chart values
#
# This chart deploys the API, autoscaled worker (cron scheduler gated by
# a Redis lease so workers are interchangeable), web UI, optional
# python-plugins sidecar, a one-shot db-init Job that runs migrations +
# seeds at install/upgrade time, and a generated Secret that auto-
# provisions a platform-admin user on first install.
#
# A default `helm install` stands up a COMPLETE stack: Bitnami-legacy
# subcharts for Postgres + Redis ship enabled, an in-chart Qdrant
# Deployment ships enabled, the Secret is generated with random keys.
# OpenSearch is also bundled (via Bitnami legacy) but defaults OFF
# because it's heavy and most installs don't need lexical retrieval
# on day one.
#
# BYO each backend by flipping the corresponding `bundled*.enabled:
# false` and providing the URL on `secrets.existingSecret`. The two
# extremes are both supported and well-tested:
#
#   helm install ragdoll ./infra/helm/ragdoll
#     → bundled Postgres + Redis + Qdrant, generated Secret. Done.
#
#   helm install ragdoll ./infra/helm/ragdoll \
#       --set bundledpostgres.enabled=false \
#       --set bundledredis.enabled=false \
#       --set bundledqdrant.enabled=false \
#       --set secrets.create=false
#     → fully BYO; you provide the Secret with every URL pre-wired.
#
# Run `helm dependency update infra/helm/ragdoll` ONCE before the
# first install to pull the Bitnami subchart tarballs.
# ============================================================================

# ---------------------------------------------------------------------------
# Common labels and annotations applied to EVERY resource the chart
# renders. Intended for cluster policies (Kyverno, Gatekeeper, OPA)
# that require specific metadata on all objects — e.g.
# `app.kubernetes.io/part-of`, a cost-allocation tag, a compliance
# marker, or a Kyverno-mandated `owner` label.
#
# Examples:
#
#   commonLabels:
#     app.kubernetes.io/part-of: ragdoll
#     environment: prod
#     team: platform
#   commonAnnotations:
#     ragdoll.example.com/owner: "team-platform"
#     ragdoll.example.com/cost-center: "rd-100"
#
# These are MERGED with the chart's per-resource labels — if a key
# collides, the operator-supplied value wins so policy labels can't
# be silently overridden by the chart.
# ---------------------------------------------------------------------------
commonLabels: {}
commonAnnotations: {}

image:
  repository: ragdoll
  tag: latest
  pullPolicy: IfNotPresent

# Web is built from the same monorepo but ships as a separate nginx image
# (see infra/docker/web.Dockerfile). The default image uses
# nginx-unprivileged so it binds to a non-privileged port (8080) under a
# non-root UID — required by OpenShift's restricted-v2 SCC, and harmless
# everywhere else.
webImage:
  repository: ragdoll-web
  tag: latest
  pullPolicy: IfNotPresent

# Service-account used by every workload. Leave name empty to let helm
# generate `<release>-ragdoll`; create: false skips creation if you've
# already minted one out-of-band.
serviceAccount:
  create: true
  name: ""

# ---------------------------------------------------------------------------
# API
# ---------------------------------------------------------------------------
#
# Multi-pod safe: every shared state goes through Redis when REDIS_URL is set
# (change-event bus, BullMQ queue, SSO pending-state cache). Session tokens
# are stateless HMACs. So api.replicas > 1 just works as long as REDIS_URL is
# wired on the existing secret.
api:
  replicas: 2
  port: 3001
  env: production
  # Default-deny auth: the first install reads these from the existing
  # secret and provisions a single platform_admin user. Override to your
  # tenant's real address & a strong password BEFORE the first install.
  # Subsequent installs are idempotent — the user is only created if no
  # account with this email exists.
  bootstrapAdmin:
    # When `existingSecret` carries `BOOTSTRAP_ADMIN_EMAIL` /
    # `BOOTSTRAP_ADMIN_PASSWORD`, those win and you can leave these
    # placeholders alone.
    email: "admin@change-me.local"
    # Empty → falls back to the value on the existing secret. NEVER ship
    # a real password in values.yaml; use the secret.
    password: ""
  # Browser-facing URL of the web UI. Used as the SSO callback target
  # and email links. Must match what an operator types into their
  # browser, including scheme + port.
  webBaseUrl: "http://localhost:8088"
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }
  # CPU-target HorizontalPodAutoscaler. When enabled, `api.replicas`
  # above is ignored in favour of the min/max here. Requires the
  # metrics-server addon on the cluster.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# Worker
# ---------------------------------------------------------------------------
#
# Single autoscaled Deployment. Workers are interchangeable: every pod
# runs both the BullMQ consumer AND the cron scheduler timer, but only
# the pod that currently holds the Redis-backed
# `ragdoll:scheduler:leader` lease actually enqueues scheduled runs.
# Failover is automatic (lease TTL 10 s, renewed every ~3 s).
#
# The earlier leader/follower split that pinned scheduler-bearing pods
# to replicas:1 is gone — the lease replaces it and the workers
# autoscale uniformly.
worker:
  # Used when autoscaling.enabled is false.
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }
  # CPU-target HorizontalPodAutoscaler. Defaults to min 1 / max 10 /
  # 70% CPU. Safe to autoscale freely now that the scheduler lease
  # gates single-fire — earlier the scheduler-bearing pod had to stay
  # at replicas:1, which is what the leader/follower split solved.
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  # Comma-separated list of Ollama models the worker pulls/warms on
  # boot. Empty disables warm-up (saves cold-start time on installs
  # that don't use local Ollama).
  ollamaWarmModels: ""
  ollamaWarmIntervalMs: 300000

# ---------------------------------------------------------------------------
# Web (nginx serving the SPA + reverse-proxying /api to the API Service)
# ---------------------------------------------------------------------------
web:
  replicas: 2
  # 8080 keeps the container port non-privileged so it works under
  # OpenShift's restricted-v2 SCC (random non-root UID) without any
  # extra capability. The web Service still exposes port 80 externally.
  port: 8080
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  # The web container is stateless nginx — multi-pod is always safe.
  # Autoscaling is appropriate at scale; defaults conservative.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Python plugins (crawl4ai + scrapy). Optional; enable only when you want
# the crawler plugins registered in the plugin catalog. Image is large
# (~headless Chromium) — keep replicas at 1.
# ---------------------------------------------------------------------------
pythonPlugins:
  enabled: true
  replicas: 1
  port: 8000
  image:
    repository: ragdoll-python-plugins
    tag: latest
    pullPolicy: IfNotPresent
  timeoutMs: 300000
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "2", memory: 2Gi }

# ---------------------------------------------------------------------------
# Backend wiring. When the corresponding `bundled*.enabled` is true,
# DATABASE_URL / REDIS_URL / QDRANT_URL / OPENSEARCH_URL are auto-
# computed and pushed into the generated Secret — operators don't
# need to set anything here. When you flip a `bundled*.enabled: false`
# to BYO, point these URLs at your external service AND set
# `secrets.create: false` so the chart uses your existing Secret.
# ---------------------------------------------------------------------------
qdrant:
  # Used when bundledqdrant.enabled is false. The bundled Qdrant lives
  # at `http://ragdoll-qdrant:6333` cluster-internally.
  url: "http://ragdoll-qdrant:6333"

opensearch:
  # Used when bundledopensearch.enabled is false. The bundled
  # OpenSearch service is `<release>-bundledopensearch:9200` because
  # the Bitnami subchart names its Service from the release + alias.
  url: ""

# Optional graph backend. Set to "" to disable the graph modality.
dgraph:
  url: ""

# Optional Ollama (local LLM). Set to "" to disable Ollama-backed plugins.
ollama:
  baseUrl: ""

# Which vector backend `createVectorStore` picks for plugins that haven't
# been pointed at a specific Dataset. `qdrant` | `pgvector` | `opensearch`.
# Per-dataset selection (ADR 0016) overrides this.
vectorBackend: qdrant

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
#
# Two independent metric paths, freely combinable:
#
#   otel.enabled = true  → SDK pushes metrics + logs + traces over OTLP
#                          to `otel.endpoint`. Existing docker-compose
#                          LGTM-bundle behaviour.
#   prometheus.enabled = true
#                        → SDK additionally serves a `/metrics`
#                          endpoint on `prometheus.port`. A Prometheus
#                          ServiceMonitor (optional, gated on the CRD)
#                          scrapes each pod.
#
# Both default to ON for OTel (back-compat) and OFF for Prometheus.
# Set both true to run in parallel during a migration. Set both false
# to make `getMeter()` a zero-cost noop — useful for stripped-down
# installs that don't need metrics at all.
#
# CRITICAL: every metric the app code emits goes through ONE shared
# MeterProvider. Adding/removing a backend never requires touching
# call sites — `getMeter()` is the single chokepoint.
# ---------------------------------------------------------------------------
otel:
  enabled: true
  endpoint: "http://otel-collector:4318"
  # Service-namespace + environment attributes appended to every span /
  # metric / log. The collector uses them to route to per-tenant
  # dashboards.
  resourceAttributes: "service.namespace=ragdoll,deployment.environment=production"

prometheus:
  # Master toggle. When false, none of the Prometheus wiring fires —
  # no /metrics endpoint, no Service port, no ServiceMonitor, no
  # PrometheusRule. The OTel path is unaffected.
  enabled: false
  # The OpenTelemetry SDK's PrometheusExporter starts its own HTTP
  # listener on this port. 9464 is the SDK's documented default. Each
  # api / worker container exposes it as a named port `metrics`.
  port: 9464

  # Set true to bypass the helm `lookup` CRD-existence check used by
  # the ServiceMonitor + PrometheusRule templates. Required when
  # rendering OFFLINE (`helm template` with no cluster access, e.g.
  # in CI pipelines that diff manifests before apply). The default
  # (false) gives a clear template-time error when the CRD is missing
  # — much friendlier than apply-time "no matches for kind".
  assumeCrdsInstalled: false

  # ServiceMonitor (prometheus-operator CRD). Renders only when
  # prometheus.enabled AND prometheus.serviceMonitor.enabled. We
  # check for the CRD via helm `lookup` at render time and refuse to
  # render if the cluster doesn't have prometheus-operator installed —
  # avoids a confusing apply-time CRD-not-found error.
  serviceMonitor:
    enabled: true
    # Scrape interval. 30s matches Prometheus's default global; tune
    # down to 15s if you also use the metrics for HPA decisions.
    interval: 30s
    scrapeTimeout: 10s
    # Extra labels for Prometheus's ServiceMonitor selector. Most
    # operators pin `release: kube-prometheus-stack` (the helm release
    # name of their prometheus-operator install) so their Prometheus
    # picks up this ServiceMonitor automatically.
    additionalLabels: {}
    # metricRelabelings is the chokepoint for cardinality control.
    # Default drops nothing — operators add per-env rules to drop or
    # keep high-cardinality labels (e.g. drop `pipeline_id` when a
    # tenant has 10k pipelines).
    metricRelabelings: []

  # PrometheusRule (prometheus-operator CRD). Same CRD-existence gate
  # as ServiceMonitor. Starter rules ship below; override the whole
  # `rules` list to replace, or extend it.
  prometheusRule:
    enabled: true
    additionalLabels: {}
    # Default starter rules. Operators can replace wholesale by
    # overriding `rules` — these are sensible baselines, not a SLO.
    rules:
      - alert: RagdollApiHighErrorRate
        expr: |
          sum(rate(ragdoll_api_requests_total{status=~"5.."}[5m])) by (pod)
            / sum(rate(ragdoll_api_requests_total[5m])) by (pod) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "RAGdoll API 5xx rate > 5% on {{ $labels.pod }}"
          description: |
            5xx error ratio is {{ $value | humanizePercentage }} over
            the last 5 min. Check execution traces and recent deploys.
      - alert: RagdollWorkerExecutionsStuck
        expr: ragdoll_worker_inflight > 0 and on(pod) rate(ragdoll_worker_executions_total[10m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Worker {{ $labels.pod }} has inflight executions but no completions"
          description: |
            inflight={{ $value }} but no executions completed in the
            last 10 min — scheduler / queue / plugin likely stuck.
      - alert: RagdollSchedulerLeaderMissing
        # The lease acquire heart-beats are logged, not metricized,
        # but a leader absence shows as zero scheduled-enqueue rate
        # for an unexpectedly long window. Tune the threshold to the
        # tightest schedule you actually run.
        expr: |
          absent(sum by () (rate(ragdoll_worker_executions_total{worker_id=~".+"}[10m])))
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: "No worker executions for 20 min"
          description: |
            Either zero load is real, or the scheduler lease has no
            holder. Check the worker pods + the `ragdoll:scheduler:leader`
            key in Redis.

secrets:
  # When `create: true` (the default), the chart generates a Secret
  # named `<release>-ragdoll-secrets` on first install with random
  # SECRET_ENCRYPTION_KEY / SESSION_SECRET / BOOTSTRAP_ADMIN_PASSWORD
  # and auto-wired DATABASE_URL / REDIS_URL pointed at the bundled
  # subchart services. On `helm upgrade` the existing values are
  # PRESERVED (via the lookup-with-fallback pattern) so rotating
  # passwords doesn't invalidate every secret-at-rest.
  #
  # When `create: false`, the chart uses the operator-managed Secret
  # named below — same shape as infra/k8s/ragdoll-secrets.example.yaml.
  create: true
  existingSecret: ""   # ignored when create: true; defaults to <release>-ragdoll-secrets

# ---------------------------------------------------------------------------
# Bundled backends (subchart dependencies).
#
# Each bundled* block toggles a backend ON (default) or OFF (BYO via
# the existingSecret + URL values above). When ON, the chart auto-
# wires DATABASE_URL / REDIS_URL / QDRANT_URL / OPENSEARCH_URL into
# the generated Secret so workloads find the backend with no extra
# config.
# ---------------------------------------------------------------------------

# Postgres — Bitnami legacy chart. Holds RAGdoll's orchestration
# state (pipelines, runs, secrets, RBAC). The db-init Job migrates
# the schema on every helm install/upgrade.
bundledpostgres:
  enabled: true
  # Bitnami subchart overrides. The auth block here is consumed BOTH
  # by the Bitnami subchart (which provisions postgres with these
  # creds) AND by our generated Secret (which embeds the password
  # into DATABASE_URL). Both ends always agree because they read the
  # same single source of truth — these values.
  #
  # OPERATOR ACTION for production: override `auth.password` AND
  # `auth.postgresPassword` (the superuser) with strong unique
  # values. The defaults below are suitable ONLY for dev installs.
  #
  # Image overrides point at `bitnamilegacy` — the still-free image
  # registry mirroring the pre-paywall Bitnami catalog. The default
  # `bitnami/postgresql` repository is now paywalled and pulls will
  # fail with `403 Forbidden`.
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  # `os-shell` is used by the chart's init scripts.
  volumePermissions:
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
  # Optional `postgres-exporter` sidecar — disabled by default but
  # repointed too so a flip-on doesn't break.
  metrics:
    image:
      registry: docker.io
      repository: bitnamilegacy/postgres-exporter
  auth:
    username: ragdoll
    database: ragdoll
    password: "ragdoll-please-override"
    postgresPassword: "ragdoll-please-override-admin"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "2", memory: 2Gi }

# Redis — Bitnami legacy chart. Backs BullMQ (job queue + leader
# election + dead-letter), the change-event bus, the SSO state cache.
# All of those are re-derivable on Redis restart so persistence is
# optional. Single replica, standalone, auth disabled — the cluster
# network namespace is the security boundary.
bundledredis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  # Repoint to bitnamilegacy (same rationale as bundledpostgres).
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
  sentinel:
    image:
      registry: docker.io
      repository: bitnamilegacy/redis-sentinel
  metrics:
    image:
      registry: docker.io
      repository: bitnamilegacy/redis-exporter
  volumePermissions:
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
  sysctl:
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
  kubectl:
    image:
      registry: docker.io
      repository: bitnamilegacy/kubectl
  master:
    persistence:
      enabled: false   # nothing in Redis is source of truth
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 500m, memory: 512Mi }
    # SAFE-by-construction config: even if a snapshot somehow runs
    # and fails, writes keep working. Prevents the
    # `MISCONF stop-writes-on-bgsave-error` failure mode entirely.
    configuration: |-
      save ""
      stop-writes-on-bgsave-error no
      appendonly no

# Qdrant — hand-rolled inline (no Bitnami chart exists). Persistence
# defaults ON because Qdrant IS source of truth for the vector index;
# losing it on pod restart costs full re-embedding.
bundledqdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: "v1.12.4"
    pullPolicy: IfNotPresent
  # Optional API key. When set, gets pushed into the generated secret
  # so the api/worker include it in QDRANT_URL → header.
  apiKey: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
    accessModes: [ReadWriteOnce]

# OpenSearch — Bitnami legacy chart. Default OFF because it's a
# heavy install (JVM + 1-3GB heap by default) and most retrieval
# patterns work without lexical until you scale past pure vector.
# When you enable this, the chart auto-wires OPENSEARCH_URL.
bundledopensearch:
  enabled: false
  # Repoint to bitnamilegacy (same rationale as bundledpostgres).
  image:
    registry: docker.io
    repository: bitnamilegacy/opensearch
  dashboards:
    image:
      registry: docker.io
      repository: bitnamilegacy/opensearch-dashboards
  sysctlImage:
    registry: docker.io
    repository: bitnamilegacy/os-shell
  volumePermissions:
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
  metrics:
    image:
      registry: docker.io
      repository: bitnamilegacy/opensearch-exporter
  snapshots:
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
  security:
    enabled: false  # internal cluster only
  master:
    replicaCount: 1
    resources:
      requests: { cpu: 250m, memory: 1Gi }
      limits: { cpu: "2", memory: 2Gi }
  data:
    replicaCount: 1
  coordinating:
    replicaCount: 0
  ingest:
    replicaCount: 0

# ---------------------------------------------------------------------------
# Pod & container security context. Defaults are restrictive enough to
# pass OpenShift's `restricted-v2` SCC AND vanilla k8s PodSecurity
# `restricted`. Override per-environment if you need to relax (rare —
# the apps don't need root, privileged caps, or specific UIDs).
# ---------------------------------------------------------------------------
podSecurityContext:
  # `runAsNonRoot: true` matches both restricted-v2 and PodSecurity
  # restricted. We don't pin runAsUser — let OpenShift assign one from
  # the namespace's UID range; on vanilla k8s the container image's
  # USER takes effect (nginx-unprivileged ships as UID 101, node's
  # `node` user is 1000).
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # too disruptive for nginx temp files; flip per-env if you've validated.
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Ingress (vanilla Kubernetes). Mutually exclusive with `openshift.route`
# below — use one or the other depending on your cluster.
#
# The web container's nginx reverse-proxies /api/* AND /mcp to the api
# Service internally, so a single Ingress + hostname serves the web UI,
# the REST API the CLI hits, and the MCP endpoint Claude Desktop / IDE
# clients hit. The optional `apiIngress` below is only for installs
# that want the API on its OWN DNS (e.g. api.example.com vs
# ragdoll.example.com) to apply different rate limits, WAF rules, or
# auth.
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ragdoll.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: ragdoll-tls
  #   hosts: [ragdoll.example.com]

# Optional SEPARATE Ingress for the API service. Most installs leave
# this off and let the web's nginx proxy serve /api + /mcp through the
# main Ingress above. Enable when you need a distinct hostname or
# per-API ingress controller policy.
apiIngress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.ragdoll.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# OpenShift-specific resources. Enable on OpenShift only.
# ---------------------------------------------------------------------------
openshift:
  # Render an OpenShift Route instead of an Ingress. Routes are the
  # idiomatic OpenShift entrypoint; the cluster's router shard picks
  # them up automatically. tls.termination defaults to `edge` (TLS
  # terminates at the router; the cluster-internal hop to the web
  # service stays plain HTTP).
  route:
    enabled: false
    host: ""   # empty → OpenShift generates a hostname from the route name
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
    annotations: {}
  # Optional SCC binding. Most installs DON'T need this — the pod/
  # container securityContext above already satisfies `restricted-v2`,
  # which every OpenShift namespace gets by default. Enable when you've
  # had to relax securityContext (e.g. mounted hostPath for a debugging
  # session) and need to bind the SA to a named SCC like `nonroot-v2`
  # or `anyuid`. Creates a Role + RoleBinding granting `use` on the
  # named SCC to the chart's ServiceAccount.
  scc:
    enabled: false
    name: restricted-v2   # ignored when scc.enabled: false

  # Optional SEPARATE Route for the API service. Same trade-off as
  # `apiIngress` above: most installs leave this off and let the web
  # Route serve /api + /mcp through the main Route. Enable when API
  # traffic needs its own hostname or route policy.
  apiRoute:
    enabled: false
    host: ""
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
    annotations: {}
