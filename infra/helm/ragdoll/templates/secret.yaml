{{- if .Values.secrets.create }}
{{/*
Generated Secret. Random values on first install, preserved on
upgrade via the `lookup` + `default` pattern: read the existing
Secret if any, fall back to a freshly-generated value if not.

Why this pattern and not a Helm pre-install hook:
  - Hooks bypass `helm rollback` (the hooked resource isn't
    captured in the release manifest).
  - Hooks complicate the BYO path — you'd have to delete the hook-
    created Secret to switch to your own.
  - The lookup approach is idempotent: the same `helm upgrade` either
    keeps your existing values OR generates new ones for keys that
    don't yet exist on the Secret (e.g. when you add a new env later).

DATABASE_URL / REDIS_URL / OPENSEARCH_URL are computed from the
`bundled*` settings and ALWAYS overwritten on every upgrade — if you
flip `bundledpostgres.enabled: false` and re-install, the URL on the
secret tracks the change.

The cryptographic secrets (SECRET_ENCRYPTION_KEY, SESSION_SECRET,
BOOTSTRAP_ADMIN_PASSWORD) are generated ONCE and preserved across
upgrades. Rotating them deliberately means `kubectl delete secret
<release>-ragdoll-secrets` then `helm upgrade`.
*/}}
{{- $secretName := include "ragdoll.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingData := default dict (get ($existing | default dict) "data") -}}

{{/* Helper: read existing base64 value, or generate + use a random one. */}}
{{- $encKey := default (randAlphaNum 64) (get $existingData "SECRET_ENCRYPTION_KEY" | default "" | b64dec) -}}
{{- $sessionKey := default (randAlphaNum 64) (get $existingData "SESSION_SECRET" | default "" | b64dec) -}}
{{- $adminPwd := default (randAlphaNum 24) (get $existingData "BOOTSTRAP_ADMIN_PASSWORD" | default "" | b64dec) -}}


apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app: ragdoll
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  annotations:
    # Survives `helm uninstall` so a re-install can re-read the
    # crypto material instead of generating new keys and orphaning
    # every encrypted secret-at-rest in the platform's own store.
    "helm.sh/resource-policy": keep
    {{- with (include "ragdoll.commonAnnotations" . | trim) }}
    {{- . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  # ---- App cryptographic secrets (preserved across upgrades) -----
  SECRET_ENCRYPTION_KEY: {{ $encKey | quote }}
  SESSION_SECRET: {{ $sessionKey | quote }}

  # ---- Bootstrap admin -------------------------------------------
  BOOTSTRAP_ADMIN_EMAIL: {{ .Values.api.bootstrapAdmin.email | quote }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ $adminPwd | quote }}

  # ---- Backends --------------------------------------------------
  # URLs that point at bundled subchart services. Always overwritten
  # on every render so a flipped `bundled*.enabled` tracks through to
  # the next install/upgrade. When a backend is BYO (bundled*.enabled:
  # false), the key is omitted here and the operator's existing-
  # secret value (or a separate env override) takes over.
  {{- if .Values.bundledpostgres.enabled }}
  DATABASE_URL: {{ include "ragdoll.databaseUrl" . | quote }}
  {{- end }}
  {{- if .Values.bundledredis.enabled }}
  REDIS_URL: {{ include "ragdoll.redisUrl" . | quote }}
  {{- end }}
  {{- if and .Values.bundledopensearch.enabled (include "ragdoll.opensearchUrl" .) }}
  OPENSEARCH_URL: {{ include "ragdoll.opensearchUrl" . | quote }}
  {{- end }}
  {{- if and .Values.bundledqdrant.enabled .Values.bundledqdrant.apiKey }}
  QDRANT_API_KEY: {{ .Values.bundledqdrant.apiKey | quote }}
  {{- end }}
{{- end }}
