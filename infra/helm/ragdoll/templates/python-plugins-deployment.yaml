{{- /* Standalone topology only: a shared python-plugins Deployment + Service
   that all api/worker pods call. In the default `sidecar` mode the
   container is injected per-pod (see api/worker deployments) and this file
   renders nothing. (issues-log #8) */ -}}
{{- if and .Values.pythonPlugins.enabled (eq .Values.pythonPlugins.mode "standalone") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-python-plugins
  labels:
    app: {{ .Release.Name }}-python-plugins
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.pythonPlugins.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-python-plugins
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-python-plugins
        {{- include "ragdoll.commonLabels" . | nindent 8 }}
      {{- with (include "ragdoll.commonAnnotations" . | trim) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ragdoll.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- include "ragdoll.pythonPluginsContainer" . | nindent 8 }}
{{- end }}
