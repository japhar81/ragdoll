apiVersion: v1
kind: Service
metadata:
  name: ragdoll-api
  labels:
    app: ragdoll-api
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    app: ragdoll-api
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.api.port }}
