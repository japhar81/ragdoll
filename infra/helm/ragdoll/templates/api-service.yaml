apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
    {{- if .Values.prometheus.enabled }}
    # Marker label the chart's ServiceMonitor selects on. Only stamped
    # when prometheus.enabled so disabling the pull path also removes
    # the api from the ServiceMonitor's match set.
    prometheus-scrape: "true"
    {{- end }}
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    app: {{ .Release.Name }}-api
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.api.port }}
    {{- if .Values.prometheus.enabled }}
    - name: metrics
      port: {{ .Values.prometheus.port }}
      targetPort: metrics
    {{- end }}
