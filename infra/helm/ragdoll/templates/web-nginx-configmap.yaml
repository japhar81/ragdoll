apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-web-nginx
  labels:
    app: ragdoll-web
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  # Keyed `.template` (NOT `default.conf`) and mounted into
  # /etc/nginx/templates/ — never /etc/nginx/conf.d/.
  #
  # The web image ships its nginx config as an *.template so the official
  # entrypoint can substitute ${NGINX_LOCAL_RESOLVERS} at boot (issues #12).
  # That entrypoint step (20-envsubst-on-templates.sh) RENDERS
  # /etc/nginx/templates/*.template → /etc/nginx/conf.d/. A ConfigMap
  # subPath-mounted onto /etc/nginx/conf.d/default.conf is a read-only bind
  # mount sitting on the entrypoint's write target, so nginx dies at boot with
  #   "can't create /etc/nginx/conf.d/default.conf: Read-only file system".
  # Mounting as the *source* template instead leaves the destination writable.
  #
  # The `$http_upgrade` / `$host` / `$uri` … below are nginx RUNTIME variables
  # and must survive envsubst. They do, because the image pins
  # NGINX_ENVSUBST_FILTER=NGINX_LOCAL_RESOLVERS (re-asserted in the Deployment
  # env for defense-in-depth), which restricts substitution to that single
  # name. Without that filter envsubst would blank every `$…` here and nginx
  # would boot a silently broken config.
  default.conf.template: |
    # Map the client's `Upgrade` header to the upstream `Connection` value
    # so WebSocket upgrades for `/api/events` are forwarded rather than
    # swallowed. Regular HTTP requests (where `$http_upgrade` is empty)
    # send `Connection: ""` which nginx treats as "no Connection header".
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    server {
        listen {{ .Values.web.port }};
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Reverse-proxy control-plane endpoints to the api Service. The
        # bundled docker image's nginx.conf hard-coded `api:3001` (the
        # docker-compose service name + port). In Kubernetes the Service
        # is `ragdoll-api` on port 80, so the chart renders this
        # ConfigMap and mounts it into the web container.
        location /api/ {
            proxy_pass http://ragdoll-api:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # First /run on a cold CPU Ollama can take several minutes.
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        location = /healthz {
            proxy_pass http://ragdoll-api:80/healthz;
            proxy_set_header Host $host;
        }

        location = /readyz {
            proxy_pass http://ragdoll-api:80/readyz;
            proxy_set_header Host $host;
        }

        # MCP endpoint — single POST per turn from any MCP client
        # (Claude Desktop, IDE extensions, llm scripts). Same upstream
        # as /api/, same timeouts: the tool dispatch can invoke a
        # synchronous pipeline that runs for minutes against a cold
        # Ollama. Bound here so external CLI/MCP clients can reach
        # the API through the same Ingress/Route as the web UI
        # without a separate hostname.
        location = /mcp {
            proxy_pass http://ragdoll-api:80/mcp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
