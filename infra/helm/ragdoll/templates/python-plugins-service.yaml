{{- /* Standalone topology only — in sidecar mode each pod reaches its own
   python-plugins over localhost, so no Service is needed. (issues-log #8) */ -}}
{{- if and .Values.pythonPlugins.enabled (eq .Values.pythonPlugins.mode "standalone") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-python-plugins
  labels:
    app: {{ .Release.Name }}-python-plugins
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    app: {{ .Release.Name }}-python-plugins
  ports:
    - name: http
      port: {{ .Values.pythonPlugins.port }}
      targetPort: {{ .Values.pythonPlugins.port }}
      # Phase B: appProtocol: http2 tells kube-proxy / Service mesh / Envoy
      # sidecars that this Service speaks HTTP/2 end-to-end. Without the
      # hint, the platform may downgrade to HTTP/1.1 and break native gRPC
      # + full-duplex bidi (Connect HTTP/JSON still works over h1, so unary
      # and server-stream stay functional even if dropped, but the bidi
      # path silently hangs). Hypercorn negotiates h1 + h2 from the same
      # listener — the appProtocol just promises h2 capability.
      {{- if .Values.pythonPlugins.http2.enabled }}
      appProtocol: http2
      {{- end }}
{{- end }}
