{{- if .Values.redis.enabled }}
{{/*
Optional bundled Redis (dev / small installs).

Ships a SAFE configuration that can never hit
`MISCONF Redis is configured to save RDB snapshots, but it's currently
unable to persist to disk. Commands that may modify the data set are
disabled` — the error operators have reported from misconfigured
Redises:

  - When `persistence.enabled: false` (default): no RDB, no AOF, no
    disk writes. Pure in-memory. Cleanest possible config for a
    queue + cache.
  - When `persistence.enabled: true`: AOF with everysec fsync to a
    PVC at /data. AOF writes incrementally; even if a flush fails
    Redis surfaces it but doesn't lock writes (we set
    stop-writes-on-bgsave-error no for the RDB path too as
    belt-and-braces).

Production should still prefer a managed Redis (Elasticache,
Memorystore, in-cluster operator) — this template is for the dev /
proof-of-concept / small-scale case.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ragdoll-redis
  labels:
    app: ragdoll-redis
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    # No protected-mode: we're inside a k8s network namespace and
    # exposed only via a ClusterIP Service. Operators who need auth
    # should set REDIS_URL with a `redis://:<password>@...` shape on
    # the existing secret AND add `requirepass <password>` here.
    protected-mode no
    # Even if a snapshot somehow runs (debug command, a future config
    # override), a failed bgsave must not pause writes. This is the
    # ONE config line that prevents the MISCONF error operators hit.
    stop-writes-on-bgsave-error no
    {{- if .Values.redis.persistence.enabled }}
    # Persistence ON: AOF only. RDB stays off because it's the
    # failure-prone path; AOF rewrites incrementally on the same
    # /data PVC and survives restarts.
    save ""
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    dir /data
    {{- else }}
    # Persistence OFF: pure in-memory. `save ""` disables RDB.
    save ""
    appendonly no
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ragdoll-redis
  labels:
    app: ragdoll-redis
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    app: ragdoll-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- if .Values.redis.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ragdoll-redis
  labels:
    app: ragdoll-redis
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.redis.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
  {{- with .Values.redis.persistence.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragdoll-redis
  labels:
    app: ragdoll-redis
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate) — a second Redis pod sharing the
    # same PVC would race AOF rewrites and corrupt the log. Single-
    # writer guarantee enforced at the deployment strategy level.
    type: Recreate
  selector:
    matchLabels:
      app: ragdoll-redis
  template:
    metadata:
      labels:
        app: ragdoll-redis
        {{- include "ragdoll.commonLabels" . | nindent 8 }}
      annotations:
        # Roll the redis pod when the config changes (so a flipped
        # persistence flag actually takes effect on next upgrade).
        # Hash a small fingerprint of the persistence settings rather
        # than the whole template — including the whole template here
        # would recurse forever.
        checksum/config: {{ printf "%v|%v|%v" .Values.redis.persistence.enabled .Values.redis.image.tag (.Values.redis.persistence.size | default "") | sha256sum }}
        {{- with (include "ragdoll.commonAnnotations" . | trim) }}
        {{- . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ragdoll.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: config
              mountPath: /etc/redis/redis.conf
              subPath: redis.conf
            {{- if .Values.redis.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ .Values.redis.resources.requests.cpu }}
              memory: {{ .Values.redis.resources.requests.memory }}
            limits:
              cpu: {{ .Values.redis.resources.limits.cpu | quote }}
              memory: {{ .Values.redis.resources.limits.memory }}
      volumes:
        - name: config
          configMap:
            name: ragdoll-redis
        {{- if .Values.redis.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: ragdoll-redis
        {{- end }}
{{- end }}
