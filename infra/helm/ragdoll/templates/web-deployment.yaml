apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragdoll-web
  labels:
    app: ragdoll-web
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: ragdoll-web
  template:
    metadata:
      labels:
        app: ragdoll-web
        {{- include "ragdoll.commonLabels" . | nindent 8 }}
      annotations:
        # Roll the web pods whenever the nginx config changes (changing
        # the upstream is a no-op until we restart nginx).
        checksum/nginx: {{ include (print $.Template.BasePath "/web-nginx-configmap.yaml") . | sha256sum }}
        {{- with (include "ragdoll.commonAnnotations" . | trim) }}
        {{- . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ragdoll.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.webImage.repository }}:{{ .Values.webImage.tag }}"
          imagePullPolicy: {{ .Values.webImage.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            # The ConfigMap is an nginx *template* (see web-nginx-configmap.yaml):
            # the image entrypoint envsubst's it into /etc/nginx/conf.d/. Pin the
            # filter so ONLY ${NGINX_LOCAL_RESOLVERS} is substituted and nginx's
            # own $http_upgrade/$host/$uri survive. The image already sets this;
            # re-asserting here keeps the chart correct against a rebuilt or
            # overridden webImage.
            - name: NGINX_ENVSUBST_FILTER
              value: NGINX_LOCAL_RESOLVERS
          volumeMounts:
            # Mount as the entrypoint's SOURCE template. Mounting onto
            # /etc/nginx/conf.d/default.conf (the entrypoint's render TARGET)
            # makes it a read-only bind mount and nginx fails to boot.
            - name: nginx-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.web.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.web.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ .Values.web.resources.requests.cpu }}
              memory: {{ .Values.web.resources.requests.memory }}
            limits:
              cpu: {{ .Values.web.resources.limits.cpu | quote }}
              memory: {{ .Values.web.resources.limits.memory }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-web-nginx
