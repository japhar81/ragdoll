apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragdoll-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: ragdoll-api
  template:
    metadata:
      labels:
        app: ragdoll-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--experimental-strip-types", "apps/api/src/server.ts"]
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- if .Values.pythonPlugins.enabled }}
          # api only lists/validates the external crawler plugins for the
          # builder palette, but still needs PYTHON_PLUGIN_URL set so the
          # plugin-loader registers them.
          env:
            - name: PYTHON_PLUGIN_URL
              value: "http://{{ .Release.Name }}-python-plugins:{{ .Values.pythonPlugins.port }}"
            - name: PYTHON_PLUGIN_TIMEOUT_MS
              value: "{{ .Values.pythonPlugins.timeoutMs }}"
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
