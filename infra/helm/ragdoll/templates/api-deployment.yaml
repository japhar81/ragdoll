apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragdoll-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: ragdoll-api
  template:
    metadata:
      labels:
        app: ragdoll-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--experimental-strip-types", "apps/api/src/server.ts"]
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
