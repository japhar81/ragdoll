apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  # When autoscaling is on the HPA owns the replica count — omitting
  # `replicas` here keeps helm from resetting the scale on every
  # upgrade.
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
        {{- include "ragdoll.commonLabels" . | nindent 8 }}
      {{- with (include "ragdoll.commonAnnotations" . | trim) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ragdoll.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Block startup until the pre-install db-init Job has migrated
      # the schema. Without this guard, the api would fail readiness
      # for several minutes on a fresh install (or worse, crash on
      # missing tables) while the Job ran in parallel.
      initContainers:
        {{- include "ragdoll.waitForDbInit" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["node", "--experimental-strip-types", "apps/api/src/server.ts"]
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
            {{- if .Values.prometheus.enabled }}
            # Prometheus pull endpoint. The OTel PrometheusExporter
            # starts its own listener (see wireOtelMetrics).
            - name: metrics
              containerPort: {{ .Values.prometheus.port }}
            {{- end }}
          envFrom:
            # Sensitive vars: DATABASE_URL, REDIS_URL,
            # SECRET_ENCRYPTION_KEY, SESSION_SECRET,
            # BOOTSTRAP_ADMIN_EMAIL, BOOTSTRAP_ADMIN_PASSWORD.
            # See infra/k8s/ragdoll-secrets.example.yaml.
            - secretRef:
                name: {{ include "ragdoll.secretName" . }}
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: RAGDOLL_ENV
              value: {{ .Values.api.env | quote }}
            - name: OTEL_SERVICE_NAME
              value: "{{ .Release.Name }}-api"
            # SSO-callback / email-link base URL. Override per-env via
            # values.yaml; this is the URL the operator's browser sees.
            - name: WEB_BASE_URL
              value: {{ .Values.api.webBaseUrl | quote }}
            # Bootstrap admin: api/server.ts reads these on every boot
            # and provisions a platform_admin user IF none exists with
            # this email. Idempotent. Prefer setting both on the
            # existing secret; the inline value here is a fallback
            # for the email so you can change it without rotating the
            # secret. Setting `password` here is discouraged — leave
            # it empty and use the secret.
            {{- if .Values.api.bootstrapAdmin.email }}
            - name: BOOTSTRAP_ADMIN_EMAIL
              value: {{ .Values.api.bootstrapAdmin.email | quote }}
            {{- end }}
            {{- if .Values.api.bootstrapAdmin.password }}
            - name: BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.api.bootstrapAdmin.password | quote }}
            {{- end }}
            {{- include "ragdoll.commonBackendEnv" . | nindent 12 }}
            {{- include "ragdoll.pluginCacheEnv" . | nindent 12 }}
          volumeMounts:
            {{- include "ragdoll.pluginCacheMount" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.api.resources.requests.cpu }}
              memory: {{ .Values.api.resources.requests.memory }}
            limits:
              cpu: {{ .Values.api.resources.limits.cpu | quote }}
              memory: {{ .Values.api.resources.limits.memory }}
{{- if and .Values.pythonPlugins.enabled (eq .Values.pythonPlugins.mode "sidecar") }}
        # Per-pod python-plugins sidecar (issues-log #8): this api pod reaches
        # it over localhost, so a plugin-source reload it pushes lands on the
        # exact instance that serves its calls — no cross-replica fan-out.
        {{- include "ragdoll.pythonPluginsContainer" . | nindent 8 }}
{{- end }}
      volumes:
        {{- include "ragdoll.pluginCacheVolume" . | nindent 8 }}
