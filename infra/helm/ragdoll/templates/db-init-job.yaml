apiVersion: batch/v1
kind: Job
metadata:
  # Helm hooks delete-and-recreate the same name on each install/upgrade,
  # so include the revision in the name to keep history visible in
  # `kubectl get jobs`. `hook-succeeded` cleans completed runs after
  # success; failed runs stick around for `kubectl logs`.
  name: {{ .Release.Name }}-db-init-{{ .Release.Revision }}
  annotations:
    # Run BEFORE every install and every upgrade. Migrations are
    # idempotent (tracked in `schema_migrations`), seeds use `ON
    # CONFLICT DO NOTHING`, so re-runs are safe.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with (include "ragdoll.commonAnnotations" . | trim) }}
    {{- . | nindent 4 }}
    {{- end }}
  labels:
    app: ragdoll-db-init
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
spec:
  backoffLimit: 2
  # Migrations should complete in seconds even on a busy cluster. Cap
  # at 10 minutes so a stuck advisory lock doesn't pin the release.
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: ragdoll-db-init
        {{- include "ragdoll.commonLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ragdoll.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - node
            - --experimental-strip-types
            - scripts/db-init.ts
          # DATABASE_URL must be on the existing secret. SECRET_ENCRYPTION_KEY
          # is NOT required by db-init itself, but keeping envFrom on the
          # whole secret avoids splitting the secret schema between two
          # workloads.
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
