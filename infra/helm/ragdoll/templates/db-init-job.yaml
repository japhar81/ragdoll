apiVersion: batch/v1
kind: Job
metadata:
  # Helm hooks delete-and-recreate the same name on each install/upgrade,
  # so include the revision in the name to keep history visible in
  # `kubectl get jobs`. `hook-succeeded` cleans completed runs after
  # success; failed runs stick around for `kubectl logs`.
  name: {{ .Release.Name }}-db-init-{{ .Release.Revision }}
  annotations:
    # POST-install/upgrade so the bundled Postgres has time to start.
    # Pre-install would race the subchart provisioning and connect
    # before Postgres is listening. The api/worker pods' own init
    # containers poll schema_migrations until this Job finishes, so
    # they stay PodInitializing until migrations are applied —
    # ordering is preserved without a pre-install dependency.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with (include "ragdoll.commonAnnotations" . | trim) }}
    {{- . | nindent 4 }}
    {{- end }}
  labels:
    app: ragdoll-db-init
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
spec:
  backoffLimit: 2
  # Migrations should complete in seconds even on a busy cluster. Cap
  # at 10 minutes so a stuck advisory lock doesn't pin the release.
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: ragdoll-db-init
        {{- include "ragdoll.commonLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ragdoll.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      # Wait for Postgres to accept connections before running
      # migrations. Bundled Postgres typically needs 30-60s to come
      # up on a cold install; without this gate the Job would burn
      # through backoffLimit before the server is reachable.
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "ragdoll.secretName" . }}
          command:
            - sh
            - -ec
            - |
              i=0
              until node -e "
                import('pg').then(async (pg) => {
                  const p = new (pg.default?.Pool || pg.Pool)({ connectionString: process.env.DATABASE_URL });
                  await p.query('select 1');
                  await p.end();
                }).catch(() => process.exit(1));
              " 2>/dev/null; do
                i=$((i + 1))
                if [ "$i" -gt 60 ]; then
                  echo "wait-for-postgres: gave up after 60 attempts (~2m)" >&2
                  exit 1
                fi
                echo "wait-for-postgres: attempt $i — db not ready, sleeping 2s"
                sleep 2
              done
              echo "wait-for-postgres: connected; starting migrations"
      containers:
        - name: db-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - node
            - --experimental-strip-types
            - scripts/db-init.ts
          # DATABASE_URL must be on the existing secret. SECRET_ENCRYPTION_KEY
          # is NOT required by db-init itself, but keeping envFrom on the
          # whole secret avoids splitting the secret schema between two
          # workloads.
          envFrom:
            - secretRef:
                name: {{ include "ragdoll.secretName" . }}
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
