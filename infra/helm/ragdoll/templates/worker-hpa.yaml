{{- if .Values.worker.autoscaling.enabled }}
# Worker autoscaler.
#
# Workers are now interchangeable (the cron scheduler is gated by a
# Redis lease, not by a dedicated leader Deployment), so the whole
# pool scales freely on CPU. min/max default 1 / 10 per the "ASG"
# requirement; the lease handles single-fire so even running at min=1
# doesn't risk duplicate cron tickets when k8s rolls a pod.
#
# Requires the metrics-server addon (vanilla k8s) or Prometheus
# Adapter (OpenShift) — same `autoscaling/v2` HPA works on both.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ragdoll-worker
  labels:
    app: ragdoll-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ragdoll-worker
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
  # Scale up promptly (60s) but cool down slowly (5m) — BullMQ jobs
  # are long-tailed and a freshly started worker pays the Ollama-warmer
  # cost. We'd rather keep capacity than thrash.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
{{- end }}
