apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragdoll-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: ragdoll-worker
  template:
    metadata:
      labels:
        app: ragdoll-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--experimental-strip-types", "apps/worker/src/index.ts"]
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- if .Values.pythonPlugins.enabled }}
          # Worker executes crawl jobs. Setting PYTHON_PLUGIN_URL makes the
          # plugin-loader register the external crawl4ai_crawler /
          # scrapy_spider plugins, pointed at the in-cluster Service.
          env:
            - name: PYTHON_PLUGIN_URL
              value: "http://{{ .Release.Name }}-python-plugins:{{ .Values.pythonPlugins.port }}"
            - name: PYTHON_PLUGIN_TIMEOUT_MS
              value: "{{ .Values.pythonPlugins.timeoutMs }}"
          {{- end }}
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
