apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragdoll-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: ragdoll-worker
  template:
    metadata:
      labels:
        app: ragdoll-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--experimental-strip-types", "apps/worker/src/index.ts"]
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
