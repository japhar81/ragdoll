{{/*
Worker deployment.

Workers are interchangeable: every pod binds the shared NATS JetStream
durable consumer AND runs the cron scheduler timer. Only the pod that
currently holds the Redis-backed `ragdoll:scheduler:leader` lease actually
enqueues scheduled runs — the others' timers no-op. Failover is automatic
(lease TTL 10 s, renewed every ~3 s).

The earlier leader/follower split (one Deployment pinned to replicas:1
for the scheduler, another autoscaled for job throughput) is gone now
that the lease handles single-fire. A single autoscaled Deployment is
simpler, scales jobs uniformly, and survives any single pod's loss
within ~10–15 s.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragdoll-worker
  labels:
    app: ragdoll-worker
    {{- include "ragdoll.commonLabels" . | nindent 4 }}
  {{- with (include "ragdoll.commonAnnotations" . | trim) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: ragdoll-worker
  template:
    metadata:
      labels:
        app: ragdoll-worker
        {{- include "ragdoll.commonLabels" . | nindent 8 }}
      {{- with (include "ragdoll.commonAnnotations" . | trim) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ragdoll.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "ragdoll.waitForDbInit" . | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "--experimental-strip-types", "apps/worker/src/index.ts"]
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.prometheus.enabled }}
          # Workers are background-only normally (no inbound HTTP), but
          # the Prometheus exporter inside wireOtelMetrics still starts
          # a listener on this port. Worker pods are scraped via the
          # headless `ragdoll-worker` Service (rendered only when
          # prometheus.enabled).
          ports:
            - name: metrics
              containerPort: {{ .Values.prometheus.port }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "ragdoll.secretName" . }}
          env:
            # Per-pod identity for the OTel service.instance.id +
            # worker identity + leader-election lease token.
            # Downward API → pod name keeps each replica distinguishable
            # and gives the lease a verifiable owner string.
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_NAME
              value: "ragdoll-worker"
            {{- /* OLLAMA_BASE_URL is emitted by commonBackendEnv below, which
               picks the bundled-vs-external URL via the helper. The worker's
               warm-models loop reads the same env var. */ -}}
            {{- if .Values.worker.ollamaWarmModels }}
            - name: OLLAMA_WARM_MODELS
              value: {{ .Values.worker.ollamaWarmModels | quote }}
            - name: OLLAMA_WARM_INTERVAL_MS
              value: {{ .Values.worker.ollamaWarmIntervalMs | quote }}
            {{- end }}
            {{- include "ragdoll.commonBackendEnv" . | nindent 12 }}
          resources:
            requests:
              cpu: {{ .Values.worker.resources.requests.cpu }}
              memory: {{ .Values.worker.resources.requests.memory }}
            limits:
              cpu: {{ .Values.worker.resources.limits.cpu | quote }}
              memory: {{ .Values.worker.resources.limits.memory }}
{{- if and .Values.pythonPlugins.enabled (eq .Values.pythonPlugins.mode "sidecar") }}
        # Per-pod python-plugins sidecar (issues-log #8): this worker reaches
        # it over localhost, so a plugin-source reload it pushes lands on the
        # exact instance that serves its calls — no cross-replica fan-out.
        {{- include "ragdoll.pythonPluginsContainer" . | nindent 8 }}
{{- end }}
