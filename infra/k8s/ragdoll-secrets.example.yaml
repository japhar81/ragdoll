# Example Kubernetes Secret consumed by the RAGdoll helm chart
# (`secrets.existingSecret` in values.yaml; default name `ragdoll-secrets`).
#
# Every key listed below is required for a working install. Generate the
# *_SECRET values with `openssl rand -hex 32` (or similar); never reuse
# the placeholders here.
#
# Apply BEFORE `helm install` so the db-init Job and api/worker pods
# can mount it from the first reconcile.
apiVersion: v1
kind: Secret
metadata:
  name: ragdoll-secrets
type: Opaque
stringData:
  # ---- Backends -------------------------------------------------------
  # Postgres holds orchestration state (pipelines, runs, secrets, RBAC).
  # The db-init Job migrates this database on every helm install/upgrade.
  DATABASE_URL: "postgres://ragdoll:change-me@postgres:5432/ragdoll"
  # Redis backs BullMQ (job queue) AND the change-event bus that
  # broadcasts execution.* events across api replicas. Required.
  REDIS_URL: "redis://redis:6379"

  # ---- App cryptographic secrets --------------------------------------
  # Used to encrypt secrets-at-rest in the platform's own secret store.
  # MUST be at least 32 bytes; rotating invalidates every existing
  # secret-ref (you'd have to re-enter API keys etc.). Generate fresh
  # per environment.
  SECRET_ENCRYPTION_KEY: "change-me-32-plus-random-bytes-generate-with-openssl-rand"
  # HMACs session tokens minted on login. Rotating logs everyone out.
  # MUST be distinct from SECRET_ENCRYPTION_KEY.
  SESSION_SECRET: "change-me-distinct-32-plus-random-bytes"

  # ---- Bootstrap admin (default-deny auth) ----------------------------
  # On every api boot, server.ts checks whether a user with this email
  # exists; if not, it creates one as platform_admin with this password.
  # Change BEFORE the first install — once the user exists, changing
  # the env values DOES NOT update the existing account.
  #
  # Idempotent guard: if you typo the email and want to redo the
  # bootstrap, delete the wrong user via the admin UI or
  # `delete from users where email = 'typoed@example.com'` in psql.
  BOOTSTRAP_ADMIN_EMAIL: "admin@your-domain.example"
  BOOTSTRAP_ADMIN_PASSWORD: "change-me-strong-password"
